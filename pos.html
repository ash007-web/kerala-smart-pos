<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/assets/logo/quickbill-mark.svg" type="image/svg+xml">
  <title>QuickBill POS — New Bill</title>
  <link rel="stylesheet" href="/styles/global.css">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* POS layout: split screen */
    .pos-wrap {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      height: calc(100vh - var(--header-h) - 56px);
    }
    @media(max-width:1100px){.pos-wrap{grid-template-columns:1fr;height:auto;}}

    /* ── Left: Product catalog ── */
    .pos-left { display:flex; flex-direction:column; gap:14px; overflow:hidden; }
    .pos-search { flex-shrink:0; }
    .search-bar {
      display:flex; align-items:center; gap:10px;
      background:var(--color-surface); border:1px solid var(--color-border);
      border-radius:var(--radius-full); padding:0 16px; height:44px;
      margin-bottom:12px;
    }
    .search-bar .lucide { color:var(--color-text-tertiary); width:18px; height: 18px; }
    .search-bar input {
      flex:1; border:none; background:transparent;
      font-size:var(--font-size-body); color:var(--color-text-primary);
    }
    .search-bar input:focus { outline:none; }
    .search-bar input::placeholder { color:var(--color-text-tertiary); }
    .category-chips { display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; flex-shrink:0; }
    .category-chips::-webkit-scrollbar { display:none; }
    .chip {
      display:flex; align-items:center; gap:6px; white-space:nowrap;
      padding:6px 14px; border-radius:var(--radius-full);
      background:var(--color-surface); border:1.5px solid var(--color-border);
      font-size:var(--font-size-small); font-weight:var(--font-weight-semibold); color:var(--color-text-secondary);
      cursor:pointer; transition:all var(--transition-speed);
      flex-shrink:0;
    }
    .chip .lucide { width:16px; height:16px;}
    .chip:hover { border-color:var(--color-primary); color:var(--color-primary); }
    .chip.active {
      background:var(--color-text-primary); color:var(--color-surface);
      border-color:var(--color-text-primary);
    }
    body.dark .chip.active { background:var(--color-neutral-100); color:var(--color-text-primary); }

    /* ── Product grid ── */
    .products-grid {
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:16px; overflow-y:auto;
      padding-right:4px; flex:1;
    }
    @media(max-width:1024px){.products-grid{grid-template-columns:repeat(3,1fr);}}
    @media(max-width:768px){.products-grid{grid-template-columns:repeat(2,1fr);}}
    
    .product-card {
      /* Uses global card styling but overriding padding/margin */
      background:var(--surface-bg); border:1px solid var(--surface-border);
      border-radius:var(--radius-lg); padding:16px;
      cursor:pointer; position:relative; overflow:hidden;
      transition:all var(--transition-speed);
      display:flex; flex-direction:column;
      box-shadow:var(--shadow-sm);
    }
    .product-card:hover { transform:translateY(-2px); border-color:var(--color-primary); box-shadow:0 10px 20px rgba(0,0,0,0.08); }
    .product-card.in-cart { border-color:var(--color-success); background:#d1fae5; }
    body.dark .product-card.in-cart { background:rgba(16,185,129,0.08); }
    .product-card.out-of-stock { opacity:0.45; pointer-events:none; }
    .product-emoji {
      font-size:32px; line-height:1;
      margin-bottom:12px; display:block; text-align:center;
    }
    .product-name {
      font-size:var(--font-size-body); font-weight:var(--font-weight-semibold); line-height:1.3;
      margin-bottom:4px; color:var(--color-text-primary);
      display:-webkit-box; -webkit-line-clamp:2;
      line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }

    .product-cat { font-size:var(--font-size-small); color:var(--color-text-tertiary); margin-bottom:12px; }
    .product-footer { display:flex; align-items:center; justify-content:space-between; margin-top:auto; }
    .product-price { font-family:var(--font-mono); font-size:16px; font-weight:600; }
    .product-stock { font-size:10px; background:var(--color-neutral-100); color:var(--color-text-secondary); padding:2px 6px; border-radius:3px; }
    .product-stock.low { background:#fef3c7; color:var(--color-warning); }
    .add-btn {
      position:absolute; bottom:12px; right:12px;
      width:32px; height:32px; border-radius:50%;
      background:var(--color-primary); color:white;
      border:none; display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 12px rgba(82,17,212,0.25);
      transform:translateY(38px); opacity:0;
      transition:all var(--transition-speed);
    }
    .add-btn .lucide { width:16px; height:16px; }
    .product-card:hover .add-btn { transform:translateY(0); opacity:1; }
    .cart-badge {
      position:absolute; top:8px; right:8px;
      width:22px; height:22px; border-radius:50%;
      background:var(--color-success); color:white;
      font-size:10px; font-weight:700;
      display:flex; align-items:center; justify-content:center;
    }
    .low-chip {
      position:absolute; top:8px; left:8px;
      background:#fef3c7; color:var(--color-warning);
      font-size:10px; font-weight:700;
      padding:2px 6px; border-radius:var(--radius-full);
    }

    /* ── Right: Bill panel ── */
    .pos-right { display:flex; flex-direction:column; z-index: 900; }
    .bill-panel {
      background:var(--color-surface); border:1px solid var(--color-border);
      border-radius:var(--radius-lg); overflow:hidden;
      display:flex; flex-direction:column; height:100%;
      box-shadow:var(--shadow-card);
    }
    
    /* Mobile Cart Drawer */
    .fab-cart {
      display: none; position: fixed; bottom: 24px; right: 24px;
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--color-primary); color: white;
      border: none; box-shadow: 0 4px 16px rgba(82,17,212,0.4);
      align-items: center; justify-content: center;
      cursor: pointer; z-index: 800;
    }
    .fab-cart .cart-count {
      position: absolute; top: 10px; right: 10px;
      background: var(--color-success); color: white;
      font-size: 11px; font-weight: 700; width: 22px; height: 22px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--color-primary);
    }

    @media (max-width: 1100px) {
      .pos-right {
        position: fixed; bottom: 0; left: 0; width: 100%; height: 80vh;
        transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        padding: 0 16px 16px;
      }
      .pos-right.active { transform: translateY(0); }
      .fab-cart { display: flex; }
    }

    .bill-top {
      padding:16px 18px 0;
      background:var(--color-neutral-100);
      border-bottom:1px solid var(--color-border);
      flex-shrink:0;
    }
    body.dark .bill-top { background:var(--color-neutral-800); }
    .bill-top-row { display:flex; align-items:center; justify-content:space-between; padding-bottom:14px; }
    .bill-title { font-size:16px; font-weight:var(--font-weight-semibold); display:flex; align-items:center; gap:8px; }
    .bill-title .lucide { color:var(--color-primary); width:20px; height:20px;}
    .clear-btn {
      width:32px; height:32px; border-radius:var(--radius-md);
      background:#fee2e2; border:1px solid #fecaca;
      color:var(--color-danger); display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all var(--transition-speed);
    }
    .clear-btn:hover { background:var(--color-danger); color:white; }
    .clear-btn .lucide { width:16px; height:16px; }
    
    .d-lg-none { display: none !important; }
    @media (max-width: 1100px) {
      .d-lg-none { display: flex !important; }
    }

    /* Bill items */
    .bill-items { flex:1; overflow-y:auto; padding:8px 12px; }
    .bill-item {
      display:flex; align-items:center; gap:10px;
      padding:10px; border-radius:var(--radius-md);
      margin-bottom:4px;
      transition:background var(--transition-speed);
      border: 1px solid transparent;
    }
    .bill-item:hover { background:var(--color-neutral-100); border-color:var(--color-border);}
    .bill-item-name { flex:1; font-size:var(--font-size-body); font-weight:var(--font-weight-medium); line-height:1.2; }
    .bill-item-unit { font-size:var(--font-size-small); color:var(--color-text-tertiary); }
    .qty-ctrl { display:flex; align-items:center; gap:4px; flex-shrink:0; }
    .qty-btn {
      width:24px; height:24px; border-radius:50%;
      background:var(--color-neutral-200); border:none;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:background var(--transition-speed);
    }
    .qty-btn:hover { background:var(--color-primary); color:white; }
    .qty-btn .lucide { width:14px; height:14px; }
    .qty-val { font-size:var(--font-size-body); font-weight:var(--font-weight-semibold); min-width:20px; text-align:center; }
    .item-total { font-family:var(--font-mono); font-size:var(--font-size-body); font-weight:var(--font-weight-semibold); min-width:60px; text-align:right; }
    .remove-item {
      width:20px; height:20px; border:none; background:none;
      color:var(--color-text-tertiary); cursor:pointer; display:flex; align-items:center; justify-content:center;
    }
    .remove-item:hover { color:var(--color-danger); }
    .remove-item .lucide { width:14px; height:14px; }

    /* Empty bill */
    .empty-bill {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; height:100%; gap:8px;
      color:var(--color-text-tertiary);
    }
    .empty-bill .lucide { width:48px; height:48px; opacity:0.3; }
    .empty-bill p { font-size:var(--font-size-body); font-weight:var(--font-weight-medium); }
    .empty-bill small { font-size:var(--font-size-small); opacity:0.7; }

    /* Bill summary */
    .bill-summary {
      padding:16px 20px;
      border-top:1px solid var(--color-border);
      flex-shrink:0;
    }
    .summary-row {
      display:flex; justify-content:space-between; align-items:center;
      font-size:var(--font-size-body); color:var(--color-text-secondary); margin-bottom:8px;
    }
    .summary-row.total {
      font-size:20px; font-weight:var(--font-weight-semibold); color:var(--color-text-primary);
      border-top:1px solid var(--color-border);
      padding-top:12px; margin-top:8px; margin-bottom:0;
    }
    .summary-row.total .mono { font-family:var(--font-mono); }

    .payment-section { padding:16px 20px 20px; flex-shrink:0; border-top:1px solid var(--color-border); }
    .payment-methods { display:flex; gap:8px; margin-bottom:16px; }
    
    .pay-btn {
      flex:1; padding:10px 8px; border-radius:var(--radius-md);
      border:1px solid var(--color-border);
      background:var(--color-surface); font-size:var(--font-size-small); font-weight:var(--font-weight-semibold);
      color:var(--color-text-secondary);
      display:flex; align-items:center; justify-content:center; gap:6px;
      cursor:pointer; transition:all var(--transition-speed);
    }
    .pay-btn .lucide { width:16px; height:16px; }
    .pay-btn:hover { border-color:var(--color-text-secondary); color:var(--color-text-primary); }
    
    .pay-btn.active[data-method="cash"] {
       background:var(--color-primary); color:white;
       border-color:var(--color-primary); box-shadow:0 4px 12px rgba(82,17,212,0.25);
    }
    .pay-btn.active[data-method="upi"] {
       background:transparent; color:var(--color-primary);
       border-color:var(--color-primary);
    }
    .pay-btn.active[data-method="card"] {
       background:var(--color-neutral-800); color:white;
       border-color:var(--color-neutral-800);
    }
    
    .complete-btn {
      width:100%; height:48px;
      background:var(--color-primary); color:white;
      border:none; border-radius:var(--radius-full);
      font-size:var(--font-size-body); font-weight:var(--font-weight-semibold); cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:8px;
      box-shadow:0 4px 12px rgba(82,17,212,0.25);
      transition:all var(--transition-speed);
    }
    .complete-btn:hover { background:var(--color-primary-hover); transform:translateY(-1px); }
    .complete-btn:active { transform:scale(0.98); }
    .complete-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .complete-btn .lucide { width:18px; height:18px; }

    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.5);
      backdrop-filter:blur(6px);
      display:flex; align-items:center; justify-content:center;
      z-index:500; opacity:0; pointer-events:none;
      transition:opacity var(--transition-speed);
    }
    .modal-overlay.show { opacity:1; pointer-events:all; }
    .success-modal {
      background:var(--color-surface); border-radius:var(--radius-xl);
      padding:32px; width:340px; text-align:center;
      box-shadow:var(--shadow-elevated);
      transform:scale(0.88) translateY(20px);
      transition:transform var(--transition-speed) cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.show .success-modal { transform:scale(1) translateY(0); }
    .success-icon {
      width:64px; height:64px; border-radius:50%;
      background:#d1fae5; border:2px solid var(--color-success);
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 16px;
    }
    .success-icon .lucide { width:32px; height:32px; color:var(--color-success); }
    .success-modal h3 { font-size:1.3rem; font-weight:700; margin-bottom:8px; }
    .success-modal .bill-ref {
      font-family:var(--font-mono); font-size:0.85rem;
      color:var(--text-secondary); margin-bottom:20px;
    }
    .success-total { font-family:var(--font-family-body); font-size:2rem; font-weight:700; color:var(--color-text-primary); margin-bottom:6px; }
    .success-method {
      display:inline-block; padding:4px 12px;
      background:#d1fae5; color:#065f46;
      border-radius:var(--radius-full); font-size:0.8rem; font-weight:700;
      margin-bottom:24px;
    }
    .modal-actions { display:flex; gap:10px; }
    .modal-actions button { flex:1; }
  </style>
</head>
<body>
  <header id="navbar"></header>
  <aside id="sidebar"></aside>

  <main class="main-content">
    <div class="pos-wrap">

      <!-- LEFT: Products -->
      <div class="pos-left">
        <div class="pos-search">
          <div class="search-bar">
            <i data-lucide="search"></i>
            <input type="text" id="searchInput" placeholder="Search products or scan barcode… ( / )">
            <i data-lucide="scan-barcode" style="cursor:pointer;color:var(--color-text-secondary);" title="Scan barcode"></i>
          </div>
          <div class="category-chips">
            <button class="chip active" data-cat="all">
              <i data-lucide="layout-grid"></i> All
            </button>
            <button class="chip" data-cat="staples">
              <i data-lucide="wheat"></i> Staples
            </button>
            <button class="chip" data-cat="dairy">
              <i data-lucide="milk"></i> Dairy
            </button>
            <button class="chip" data-cat="snacks">
              <i data-lucide="cookie"></i> Snacks
            </button>
            <button class="chip" data-cat="beverages">
              <i data-lucide="glass-water"></i> Beverages
            </button>
            <button class="chip" data-cat="toiletries">
              <i data-lucide="sparkles"></i> Toiletries
            </button>
            <button class="chip" data-cat="household">
              <i data-lucide="spray-can"></i> Household
            </button>
          </div>
        </div>
        <div class="products-grid" id="productsGrid">
          <!-- 8 skeleton cards shown while products load from Firestore -->
          <div class="product-card"><div class="skeleton" style="height:130px;border-radius:var(--radius-lg)"></div></div>
          <div class="product-card"><div class="skeleton" style="height:130px;border-radius:var(--radius-lg)"></div></div>
          <div class="product-card"><div class="skeleton" style="height:130px;border-radius:var(--radius-lg)"></div></div>
          <div class="product-card"><div class="skeleton" style="height:130px;border-radius:var(--radius-lg)"></div></div>
          <div class="product-card"><div class="skeleton" style="height:130px;border-radius:var(--radius-lg)"></div></div>
          <div class="product-card"><div class="skeleton" style="height:130px;border-radius:var(--radius-lg)"></div></div>
          <div class="product-card"><div class="skeleton" style="height:130px;border-radius:var(--radius-lg)"></div></div>
          <div class="product-card"><div class="skeleton" style="height:130px;border-radius:var(--radius-lg)"></div></div>

        </div>
      </div>

      <!-- RIGHT: Bill panel -->
      <div class="pos-right">
        <div class="bill-panel">
          <div class="bill-top">
            <div class="bill-top-row">
              <div class="bill-title">
                <i data-lucide="receipt-text"></i>
                Current Bill
              </div>
              <div style="display:flex; gap:8px;">
                <button class="clear-btn d-lg-none" onclick="toggleCart()" style="background:var(--color-neutral-200);color:var(--color-text-primary);border:none;" aria-label="Close">
                  <i data-lucide="x"></i>
                </button>
                <button class="clear-btn" onclick="clearBill()" title="Clear bill">
                  <i data-lucide="trash-2"></i>
                </button>
              </div>
            </div>
          </div>

          <div class="bill-items" id="billItems">
            <div class="empty-bill">
              <i data-lucide="shopping-cart"></i>
              <p>No items added</p>
              <small>Tap a product or press / to search</small>
            </div>
          </div>

          <div class="bill-summary" id="billSummary" style="display:none;">
            <div class="summary-row">
              <span>Subtotal</span>
              <span id="subtotal" class="mono">₹0.00</span>
            </div>
            <div class="summary-row">
              <span>GST <span id="taxRateLabel">(18%)</span></span>
              <span id="taxAmt" class="mono">₹0.00</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span id="totalAmt" class="mono">₹0.00</span>
            </div>
          </div>

          <div class="payment-section">
            <div class="payment-methods">
              <button class="pay-btn active" data-method="cash">
                <i data-lucide="banknote"></i> Cash
              </button>
              <button class="pay-btn" data-method="upi">
                <i data-lucide="qr-code"></i> UPI
              </button>
              <button class="pay-btn" data-method="card">
                <i data-lucide="credit-card"></i> Card
              </button>
            </div>
            <button class="complete-btn" id="completeBtn" onclick="completeBill()" disabled>
              <i data-lucide="check-circle-2"></i>
              Complete Payment
            </button>
          </div>
        </div>
      </div>

    </div>
    
    <!-- Mobile FAB -->
    <button class="fab-cart" onclick="toggleCart()">
      <i data-lucide="shopping-cart"></i>
      <span class="cart-count" id="mobileCartCount" style="display:none;">0</span>
    </button>

    <!-- Success modal -->
    <div class="modal-overlay" id="successOverlay">
      <div class="success-modal">
        <div class="success-icon"><i data-lucide="check"></i></div>
        <h3>Payment Received!</h3>
        <div class="bill-ref" id="successRef">Bill #—</div>
        <div class="success-total" id="successTotal">₹0.00</div>
        <div class="success-method" id="successMethod">CASH</div>
        <div class="modal-actions" style="flex-wrap: wrap;">
          <button class="btn btn-secondary" style="width: 100%; margin-bottom: 8px;" onclick="printLastReceipt()" id="printReceiptBtn">
            <i data-lucide="printer"></i> Print Receipt
          </button>
          <div style="display: flex; gap: 10px; width: 100%;">
            <button class="btn btn-ghost" onclick="closeSuccess()" style="flex:1;">New Bill</button>
            <button class="btn btn-ghost" onclick="location.href='ledger.html'" style="flex:1;">
              <i data-lucide="receipt"></i> Ledger
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/js/pages/pos.js"></script>
  <script type="module" src="/js/navigation.js"></script>
  <script>lucide.createIcons();</script>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  <!-- jQuery & AJAX -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/js/jquery-ui.js"></script>
  <script src="/js/ajax-service.js"></script>
</body>
</html>
