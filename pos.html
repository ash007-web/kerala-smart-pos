<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">\n  <title>Kerala Smart POS — New Bill</title>
  <link rel="stylesheet" href="styles/global.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    /* POS layout: split screen */
    .pos-wrap {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      height: calc(100vh - var(--header-h) - 56px);
    }
    @media(max-width:1100px){.pos-wrap{grid-template-columns:1fr;height:auto;}}

    /* ── Left: Product catalog ── */
    .pos-left { display:flex; flex-direction:column; gap:14px; overflow:hidden; }
    .pos-search { flex-shrink:0; }
    .search-bar {
      display:flex; align-items:center; gap:10px;
      background:var(--bg-surface); border:1px solid var(--border-default);
      border-radius:var(--r-full); padding:0 16px; height:44px;
      margin-bottom:12px;
    }
    .search-bar .material-symbols-outlined { color:var(--text-tertiary); font-size:1.1rem; }
    .search-bar input {
      flex:1; border:none; background:transparent;
      font-size:0.9rem; color:var(--text-primary);
    }
    .search-bar input:focus { outline:none; }
    .search-bar input::placeholder { color:var(--text-tertiary); }
    .category-chips { display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; flex-shrink:0; }
    .category-chips::-webkit-scrollbar { display:none; }
    .chip {
      display:flex; align-items:center; gap:6px; white-space:nowrap;
      padding:6px 14px; border-radius:var(--r-full);
      background:var(--bg-surface); border:1.5px solid var(--border-default);
      font-size:0.82rem; font-weight:600; color:var(--text-secondary);
      cursor:pointer; transition:all var(--t-fast) var(--ease);
      flex-shrink:0;
    }
    .chip .material-symbols-outlined { font-size:0.95rem; }
    .chip:hover { border-color:var(--primary); color:var(--gold-600); }
    .chip.active {
      background:var(--sand-900); color:var(--sand-50);
      border-color:var(--sand-900);
    }
    body.dark .chip.active { background:var(--sand-100); color:var(--sand-900); }

    /* ── Product grid ── */
    .products-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
      gap:12px; overflow-y:auto;
      padding-right:4px; flex:1;
    }
    .product-card {
      background:var(--bg-surface); border:1.5px solid var(--border-subtle);
      border-radius:var(--r-xl); padding:12px;
      cursor:pointer; position:relative; overflow:hidden;
      transition:all var(--t-fast) var(--ease);
      display:flex; flex-direction:column;
    }
    .product-card:hover { border-color:var(--primary); box-shadow:var(--shadow-gold); transform:translateY(-2px); }
    .product-card.in-cart { border-color:var(--green-200); background:var(--green-50); }
    body.dark .product-card.in-cart { background:rgba(29,158,117,0.08); }
    .product-card.out-of-stock { opacity:0.45; pointer-events:none; }
    .product-emoji {
      font-size:1.8rem; line-height:1;
      margin-bottom:8px; display:block;
    }
    .product-name {
      font-size:0.82rem; font-weight:700; line-height:1.3;
      margin-bottom:4px; color:var(--text-primary);
      display:-webkit-box; -webkit-line-clamp:2;
      line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }

    .product-cat { font-size:0.72rem; color:var(--text-tertiary); margin-bottom:8px; }
    .product-footer { display:flex; align-items:center; justify-content:space-between; margin-top:auto; }
    .product-price { font-family:var(--font-mono); font-size:0.95rem; font-weight:700; }
    .product-stock { font-size:0.68rem; background:var(--sand-100); color:var(--text-tertiary); padding:2px 6px; border-radius:3px; }
    .product-stock.low { background:var(--red-50); color:var(--red-400); }
    .add-btn {
      position:absolute; bottom:8px; right:8px;
      width:28px; height:28px; border-radius:50%;
      background:var(--primary); color:var(--gold-900);
      border:none; display:flex; align-items:center; justify-content:center;
      box-shadow:var(--shadow-gold);
      transform:translateY(38px); opacity:0;
      transition:all var(--t-fast) var(--ease-spring);
    }
    .add-btn .material-symbols-outlined { font-size:1rem; }
    .product-card:hover .add-btn { transform:translateY(0); opacity:1; }
    .cart-badge {
      position:absolute; top:8px; right:8px;
      width:22px; height:22px; border-radius:50%;
      background:var(--secondary); color:white;
      font-size:0.72rem; font-weight:700;
      display:flex; align-items:center; justify-content:center;
    }
    .low-chip {
      position:absolute; top:8px; left:8px;
      background:var(--red-50); color:var(--red-400);
      font-size:0.62rem; font-weight:700;
      padding:2px 6px; border-radius:var(--r-full);
    }

    /* ── Right: Bill panel ── */
    .pos-right { display:flex; flex-direction:column; }
    .bill-panel {
      background:var(--bg-surface); border:1.5px solid var(--border-default);
      border-radius:var(--r-xl); overflow:hidden;
      display:flex; flex-direction:column; height:100%;
      box-shadow:var(--shadow-md);
    }
    .bill-top {
      padding:16px 18px 0;
      background:linear-gradient(to bottom, var(--gold-50), transparent);
      border-bottom:1px solid var(--border-subtle);
      flex-shrink:0;
    }
    body.dark .bill-top { background:linear-gradient(to bottom, rgba(239,159,39,0.06), transparent); }
    .bill-top-row { display:flex; align-items:center; justify-content:space-between; padding-bottom:14px; }
    .bill-title { font-size:1rem; font-weight:700; display:flex; align-items:center; gap:8px; }
    .bill-title .material-symbols-outlined { color:var(--primary); }
    .clear-btn {
      width:32px; height:32px; border-radius:var(--r-md);
      background:var(--red-50); border:1px solid var(--red-200);
      color:var(--red-400); display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all var(--t-fast) var(--ease);
    }
    .clear-btn:hover { background:var(--red-400); color:white; }
    .clear-btn .material-symbols-outlined { font-size:1rem; }

    /* Bill items */
    .bill-items { flex:1; overflow-y:auto; padding:8px 12px; }
    .bill-item {
      display:flex; align-items:center; gap:10px;
      padding:9px 8px; border-radius:var(--r-md);
      margin-bottom:4px;
      transition:background var(--t-fast) var(--ease);
    }
    .bill-item:hover { background:var(--sand-50); }
    body.dark .bill-item:hover { background:var(--bg-elevated); }
    .bill-item-name { flex:1; font-size:0.84rem; font-weight:600; line-height:1.2; }
    .bill-item-unit { font-size:0.72rem; color:var(--text-tertiary); }
    .qty-ctrl { display:flex; align-items:center; gap:4px; flex-shrink:0; }
    .qty-btn {
      width:24px; height:24px; border-radius:50%;
      background:var(--sand-100); border:none;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all var(--t-fast) var(--ease);
    }
    .qty-btn:hover { background:var(--primary); color:var(--gold-900); }
    .qty-btn .material-symbols-outlined { font-size:0.9rem; }
    .qty-val { font-size:0.85rem; font-weight:700; min-width:20px; text-align:center; }
    .item-total { font-family:var(--font-mono); font-size:0.88rem; font-weight:700; min-width:60px; text-align:right; }
    .remove-item {
      width:20px; height:20px; border:none; background:none;
      color:var(--text-tertiary); cursor:pointer; display:flex; align-items:center; justify-content:center;
    }
    .remove-item:hover { color:var(--red-400); }
    .remove-item .material-symbols-outlined { font-size:0.85rem; }

    /* Empty bill */
    .empty-bill {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; height:100%; gap:8px;
      color:var(--text-tertiary);
    }
    .empty-bill .material-symbols-outlined { font-size:2.5rem; opacity:0.3; }
    .empty-bill p { font-size:0.85rem; }
    .empty-bill small { font-size:0.72rem; opacity:0.7; }

    /* Bill summary */
    .bill-summary {
      padding:14px 18px;
      border-top:1px solid var(--border-subtle);
      flex-shrink:0;
    }
    .summary-row {
      display:flex; justify-content:space-between; align-items:center;
      font-size:0.85rem; color:var(--text-secondary); margin-bottom:6px;
    }
    .summary-row.total {
      font-size:1.15rem; font-weight:700; color:var(--text-primary);
      border-top:1px solid var(--border-default);
      padding-top:10px; margin-top:6px; margin-bottom:0;
    }
    .summary-row.total .mono { font-family:var(--font-mono); }

    /* Payment section */
    .payment-section { padding:12px 18px 16px; flex-shrink:0; border-top:1px solid var(--border-subtle); }
    .payment-methods { display:flex; gap:8px; margin-bottom:12px; }
    .pay-btn {
      flex:1; padding:9px 6px; border-radius:var(--r-md);
      border:1.5px solid var(--border-default);
      background:transparent; font-size:0.8rem; font-weight:700;
      color:var(--text-secondary);
      display:flex; align-items:center; justify-content:center; gap:5px;
      cursor:pointer; transition:all var(--t-fast) var(--ease);
    }
    .pay-btn .material-symbols-outlined { font-size:1rem; }
    .pay-btn:hover { border-color:var(--primary); color:var(--gold-600); }
    .pay-btn.active {
      background:var(--primary); color:var(--gold-900);
      border-color:var(--primary); box-shadow:var(--shadow-gold);
    }
    .complete-btn {
      width:100%; height:46px;
      background:var(--secondary); color:var(--green-900);
      border:none; border-radius:var(--r-full);
      font-size:0.95rem; font-weight:700; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:8px;
      box-shadow:var(--shadow-green);
      transition:all var(--t-fast) var(--ease);
    }
    .complete-btn:hover { background:var(--green-600); color:white; transform:translateY(-1px); }
    .complete-btn:active { transform:scale(0.98); }
    .complete-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
    .complete-btn .material-symbols-outlined { font-size:1.1rem; }

    /* Success modal */
    .modal-overlay {
      position:fixed; inset:0; background:var(--bg-overlay);
      backdrop-filter:blur(6px);
      display:flex; align-items:center; justify-content:center;
      z-index:500; opacity:0; pointer-events:none;
      transition:opacity var(--t-med) var(--ease);
    }
    .modal-overlay.show { opacity:1; pointer-events:all; }
    .success-modal {
      background:var(--bg-surface); border-radius:var(--r-2xl);
      padding:32px; width:340px; text-align:center;
      box-shadow:var(--shadow-lg);
      transform:scale(0.88) translateY(20px);
      transition:transform var(--t-med) var(--ease-spring);
    }
    .modal-overlay.show .success-modal { transform:scale(1) translateY(0); }
    .success-icon {
      width:64px; height:64px; border-radius:50%;
      background:var(--green-50); border:2px solid var(--green-200);
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 16px;
    }
    .success-icon .material-symbols-outlined { font-size:2rem; color:var(--green-400); }
    .success-modal h3 { font-size:1.3rem; font-weight:700; margin-bottom:8px; }
    .success-modal .bill-ref {
      font-family:var(--font-mono); font-size:0.85rem;
      color:var(--text-secondary); margin-bottom:20px;
    }
    .success-total { font-family:var(--font-display); font-size:2rem; color:var(--text-primary); margin-bottom:6px; }
    .success-method {
      display:inline-block; padding:4px 12px;
      background:var(--green-50); color:var(--green-600);
      border-radius:var(--r-full); font-size:0.8rem; font-weight:700;
      margin-bottom:24px;
    }
    .modal-actions { display:flex; gap:10px; }
    .modal-actions button { flex:1; }
  </style>
</head>
<body>
  <header id="navbar"></header>
  <aside id="sidebar"></aside>

  <main class="main-content">
    <div class="pos-wrap">

      <!-- LEFT: Products -->
      <div class="pos-left">
        <div class="pos-search">
          <div class="search-bar">
            <span class="material-symbols-outlined">search</span>
            <input type="text" id="searchInput" placeholder="Search products or scan barcode… ( / )">
            <span class="material-symbols-outlined" style="cursor:pointer;color:var(--text-secondary);" title="Scan barcode">qr_code_scanner</span>
          </div>
          <div class="category-chips">
            <button class="chip active" data-cat="all">
              <span class="material-symbols-outlined">apps</span> All
            </button>
            <button class="chip" data-cat="staples">
              <span class="material-symbols-outlined">grain</span> Staples
            </button>
            <button class="chip" data-cat="dairy">
              <span class="material-symbols-outlined">egg</span> Dairy
            </button>
            <button class="chip" data-cat="snacks">
              <span class="material-symbols-outlined">cookie</span> Snacks
            </button>
            <button class="chip" data-cat="beverages">
              <span class="material-symbols-outlined">coffee</span> Beverages
            </button>
            <button class="chip" data-cat="toiletries">
              <span class="material-symbols-outlined">soap</span> Toiletries
            </button>
            <button class="chip" data-cat="household">
              <span class="material-symbols-outlined">cleaning_services</span> Household
            </button>
          </div>
        </div>
        <div class="products-grid" id="productsGrid">
          <!-- 8 skeleton cards shown while products load from Firestore -->
          <div class="product-card"><div class="skeleton" style="height:130px;border-radius:var(--r-lg)"></div></div>
          <div class="product-card"><div class="skeleton" style="height:130px;border-radius:var(--r-lg)"></div></div>
          <div class="product-card"><div class="skeleton" style="height:130px;border-radius:var(--r-lg)"></div></div>
          <div class="product-card"><div class="skeleton" style="height:130px;border-radius:var(--r-lg)"></div></div>
          <div class="product-card"><div class="skeleton" style="height:130px;border-radius:var(--r-lg)"></div></div>
          <div class="product-card"><div class="skeleton" style="height:130px;border-radius:var(--r-lg)"></div></div>
          <div class="product-card"><div class="skeleton" style="height:130px;border-radius:var(--r-lg)"></div></div>
          <div class="product-card"><div class="skeleton" style="height:130px;border-radius:var(--r-lg)"></div></div>

        </div>
      </div>

      <!-- RIGHT: Bill panel -->
      <div class="pos-right">
        <div class="bill-panel">
          <div class="bill-top">
            <div class="bill-top-row">
              <div class="bill-title">
                <span class="material-symbols-outlined">receipt_long</span>
                Current Bill
              </div>
              <button class="clear-btn" onclick="clearBill()" title="Clear bill">
                <span class="material-symbols-outlined">delete_sweep</span>
              </button>
            </div>
          </div>

          <div class="bill-items" id="billItems">
            <div class="empty-bill">
              <span class="material-symbols-outlined">shopping_basket</span>
              <p>No items added</p>
              <small>Tap a product or press / to search</small>
            </div>
          </div>

          <div class="bill-summary" id="billSummary" style="display:none;">
            <div class="summary-row">
              <span>Subtotal</span>
              <span id="subtotal" class="mono">₹0.00</span>
            </div>
            <div class="summary-row">
              <span>GST <span id="taxRateLabel">(18%)</span></span>
              <span id="taxAmt" class="mono">₹0.00</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span id="totalAmt" class="mono">₹0.00</span>
            </div>
          </div>

          <div class="payment-section">
            <div class="payment-methods">
              <button class="pay-btn active" data-method="cash">
                <span class="material-symbols-outlined">payments</span> Cash
              </button>
              <button class="pay-btn" data-method="upi">
                <span class="material-symbols-outlined">qr_code</span> UPI
              </button>
              <button class="pay-btn" data-method="card">
                <span class="material-symbols-outlined">credit_card</span> Card
              </button>
            </div>
            <button class="complete-btn" id="completeBtn" onclick="completeBill()" disabled>
              <span class="material-symbols-outlined">check_circle</span>
              Complete Payment
            </button>
          </div>
        </div>
      </div>

    </div>

    <!-- Success modal -->
    <div class="modal-overlay" id="successOverlay">
      <div class="success-modal">
        <div class="success-icon"><span class="material-symbols-outlined">check</span></div>
        <h3>Payment Received!</h3>
        <div class="bill-ref" id="successRef">Bill #—</div>
        <div class="success-total" id="successTotal">₹0.00</div>
        <div class="success-method" id="successMethod">CASH</div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeSuccess()">New Bill</button>
          <button class="btn btn-secondary" onclick="location.href='ledger.html'">
            <span class="material-symbols-outlined">receipt</span> View Ledger
          </button>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./js/pages/pos.js"></script>
  <script type="module" src="./js/navigation.js"></script>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
