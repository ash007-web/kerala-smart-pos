<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">\n  <title>Kerala Smart POS — Sales Ledger</title>
  <link rel="stylesheet" href="styles/global.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    /* ── Summary stats ── */
    .ledger-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:26px; }
    .lstat {
      background:var(--bg-surface); border:1px solid var(--border-subtle);
      border-radius:var(--r-xl); padding:18px 20px;
      display:flex; gap:14px; align-items:center;
      box-shadow:var(--shadow-sm);
    }
    .lstat-ico {
      width:44px; height:44px; border-radius:var(--r-md); flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
    }
    .lstat-ico .material-symbols-outlined { font-size:1.2rem; }
    .lstat-label { font-size:0.78rem; font-weight:600; color:var(--text-secondary); margin-bottom:3px; }
    .lstat-value { font-family:var(--font-display); font-size:1.5rem; }
    .lstat-sub   { font-size:0.75rem; color:var(--text-tertiary); }

    /* ── Ledger controls ── */
    .ledger-bar {
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:12px; margin-bottom:16px;
    }
    .filter-pills { display:flex; gap:0; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:var(--r-lg); padding:3px; }
    .filter-pill {
      padding:6px 14px; border:none; background:transparent;
      font-size:0.82rem; font-weight:600; color:var(--text-secondary);
      border-radius: var(--r-md); cursor:pointer;
      transition:all var(--t-fast) var(--ease);
    }
    .filter-pill.active { background:var(--primary); color:var(--text-on-gold); }
    .filter-pill:hover:not(.active) { color:var(--text-primary); }
    .date-range {
      display:flex; align-items:center; gap:8px;
    }
    .date-input {
      height:36px; padding:0 12px;
      background:var(--bg-surface); border:1px solid var(--border-default);
      border-radius:var(--r-md); font-size:0.82rem; color:var(--text-primary);
    }
    .date-input:focus { outline:none; border-color:var(--primary); }
    .date-range-sep { font-size:0.78rem; color:var(--text-tertiary); }

    /* ── Bill ID ── */
    .bill-id { font-family:var(--font-mono); font-size:0.82rem; font-weight:700; color:var(--primary); }

    /* ── Expand row ── */
    .expand-row { display:none; }
    .expand-row.open { display:table-row; }
    .expand-cell {
      padding:0; background:var(--sand-50);
      border-bottom:1px solid var(--border-default);
    }
    body.dark .expand-cell { background:var(--bg-elevated); }
    .expand-inner { padding:16px 20px; }
    .expand-items-header {
      font-size:0.72rem; font-weight:700; letter-spacing:0.06em;
      color:var(--text-tertiary); text-transform:uppercase;
      display:grid; grid-template-columns:1fr 80px 80px 80px;
      padding-bottom:6px; border-bottom:1px solid var(--border-subtle); margin-bottom:8px;
    }
    .expand-item-row {
      display:grid; grid-template-columns:1fr 80px 80px 80px;
      font-size:0.82rem; padding:5px 0;
      border-bottom:1px solid var(--border-subtle);
    }
    .expand-item-row:last-child { border-bottom:none; }
    .expand-item-row .mono { font-family:var(--font-mono); }

    /* ── Pagination ── */
    .pagination {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px;
      background:var(--sand-50); border-top:1px solid var(--border-subtle);
    }
    body.dark .pagination { background:var(--bg-elevated); }
    .page-info { font-size:0.82rem; color:var(--text-secondary); }
    .page-controls { display:flex; gap:4px; align-items:center; }
    .page-btn {
      width:32px; height:32px; border-radius:var(--r-md);
      border:1px solid var(--border-default); background:transparent;
      font-size:0.82rem; font-weight:600; color:var(--text-secondary);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all var(--t-fast) var(--ease);
    }
    .page-btn:hover:not(:disabled) { border-color:var(--primary); color:var(--primary); }
    .page-btn.active { background:var(--primary); color:var(--gold-900); border-color:var(--primary); }
    .page-btn:disabled { opacity:0.3; cursor:not-allowed; }
    .page-btn .material-symbols-outlined { font-size:1rem; }
  </style>
</head>
<body>
  <header id="navbar"></header>
  <aside id="sidebar"></aside>

  <main class="main-content">
    <!-- Header -->
    <div class="flex items-center justify-between mb-4 anim-fade-up" style="margin-bottom:24px;">
      <div>
        <h1 class="page-title">Sales Ledger</h1>
        <p class="page-subtitle">All transactions — live from Firestore</p>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-ghost btn-sm" onclick="exportCSV()">
          <span class="material-symbols-outlined">download</span> Export CSV
        </button>
        <button class="btn btn-primary btn-sm" onclick="location.href='pos.html'">
          <span class="material-symbols-outlined">add_circle</span> New Bill
        </button>
      </div>
    </div>

    <!-- Summary stats -->
    <div class="ledger-stats" id="ledgerStats">
      <div class="lstat"><div class="lstat-ico skeleton" style="width:44px;height:44px;"></div><div><div class="skeleton" style="height:20px;width:100px;margin-bottom:6px;"></div><div class="skeleton" style="height:14px;width:70px;"></div></div></div>
      <div class="lstat"><div class="lstat-ico skeleton" style="width:44px;height:44px;"></div><div><div class="skeleton" style="height:20px;width:80px;margin-bottom:6px;"></div><div class="skeleton" style="height:14px;width:60px;"></div></div></div>
      <div class="lstat"><div class="lstat-ico skeleton" style="width:44px;height:44px;"></div><div><div class="skeleton" style="height:20px;width:80px;margin-bottom:6px;"></div><div class="skeleton" style="height:14px;width:90px;"></div></div></div>
    </div>

    <!-- Controls -->
    <div class="ledger-bar anim-fade-up d1">
      <div class="filter-pills" id="filterPills">
        <button class="filter-pill active" data-status="all">All Bills</button>
        <button class="filter-pill" data-status="paid">Paid</button>
        <button class="filter-pill" data-status="pending">Pending</button>
        <button class="filter-pill" data-status="refunded">Refunded</button>
      </div>
      <div class="date-range">
        <span class="material-symbols-outlined" style="color:var(--text-tertiary);font-size:1rem;">calendar_today</span>
        <input type="date" class="date-input" id="dateFrom">
        <span class="date-range-sep">to</span>
        <input type="date" class="date-input" id="dateTo">
        <button class="btn btn-ghost btn-sm" onclick="applyDateFilter()">Apply</button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap anim-fade-up d2">
      <table class="ksp-table" id="ledgerTable">
        <thead>
          <tr>
            <th>Bill ID</th>
            <th>Date & Time</th>
            <th>Items</th>
            <th>Payment</th>
            <th>Status</th>
            <th class="text-right">Total</th>
            <th class="text-right">Details</th>
          </tr>
        </thead>
        <tbody id="ledgerBody">
          <tr><td colspan="7"><div class="skeleton" style="height:50px;border-radius:0;"></div></td></tr>
          <tr><td colspan="7"><div class="skeleton" style="height:50px;border-radius:0;"></div></td></tr>
          <tr><td colspan="7"><div class="skeleton" style="height:50px;border-radius:0;"></div></td></tr>
          <tr><td colspan="7"><div class="skeleton" style="height:50px;border-radius:0;"></div></td></tr>
        </tbody>
      </table>

      <div class="pagination" id="paginator">
        <div class="page-info" id="pageInfo">Loading…</div>
        <div class="page-controls" id="pageControls"></div>
      </div>
    </div>
  </main>

  <script type="module">
    import { subscribeTransactions, fetchTransactionsByRange } from "./js/services/transactionService.js";
    import { waitForAuth } from "./js/firebase.js";
    import "./js/navigation.js";

    const PAGE_SIZE = 10;
    let allTx    = [];
    let filtered = [];
    let page     = 0;
    let statusFilter = "all";
    let unsub = null;

    // ── Wait for auth before any Firestore access ─────────────
    try {
      const user = await waitForAuth();
      console.log("[KSP] Ledger auth ready, uid:", user.uid);
    } catch { /* redirected */ }

    // Default date range: last 30 days
    const today = new Date();
    const ago30 = new Date(Date.now() - 30 * 86400000);
    document.getElementById("dateFrom").value = ago30.toISOString().split("T")[0];
    document.getElementById("dateTo").value   = today.toISOString().split("T")[0];

    // ── Real-time listener ────────────────────────────────
    unsub = subscribeTransactions((txs) => {
      console.log("[KSP] Ledger transactions:", txs.length);
      allTx = txs;
      applyFilters();
      renderStats();
    }, 200);

    function applyFilters() {
      filtered = statusFilter === "all"
        ? [...allTx]
        : allTx.filter(t => t.status === statusFilter);
      page = 0;
      renderTable();
      renderPaginator();
    }

    function renderStats() {
      const revenue  = allTx.reduce((s,t) => s + (t.total??0), 0);
      const count    = allTx.length;
      const avg      = count ? revenue / count : 0;
      const statHtml = [
        { ico:"trending_up", bg:"rgba(29,158,117,0.1)", ic:"var(--green-400)", label:"Total Revenue", value: fmtINR(revenue), sub:`From ${count} bills` },
        { ico:"receipt_long",bg:"rgba(239,159,39,0.1)",ic:"var(--gold-400)",   label:"Bills Issued",  value: count, sub:"Lifetime total" },
        { ico:"equalizer",   bg:"rgba(55,138,221,0.1)",ic:"var(--blue-400)",   label:"Avg. Bill",     value: fmtINRShort(avg), sub:"Per transaction" },
      ].map(s => `
        <div class="lstat anim-fade-up">
          <div class="lstat-ico" style="background:${s.bg};">
            <span class="material-symbols-outlined" style="color:${s.ic};">${s.ico}</span>
          </div>
          <div>
            <div class="lstat-label">${s.label}</div>
            <div class="lstat-value">${s.value}</div>
            <div class="lstat-sub">${s.sub}</div>
          </div>
        </div>`).join("");
      document.getElementById("ledgerStats").innerHTML = statHtml;
    }

    function renderTable() {
      const body   = document.getElementById("ledgerBody");
      const start  = page * PAGE_SIZE;
      const slice  = filtered.slice(start, start + PAGE_SIZE);
      const methodIcon = { cash:"payments", upi:"qr_code", card:"credit_card" };
      const methodColor= { cash:"var(--green-400)", upi:"var(--blue-400)", card:"var(--red-400)" };

      if (filtered.length === 0) {
        body.innerHTML = `<tr><td colspan="7"><div class="empty-state"><span class="material-symbols-outlined">receipt_long</span><p>No transactions found</p></div></td></tr>`;
        return;
      }

      body.innerHTML = slice.flatMap((t,i) => {
        const statusBadge = t.status === "paid"
          ? `<span class="badge badge-success">Paid</span>`
          : t.status === "refunded"
          ? `<span class="badge badge-neutral">Refunded</span>`
          : `<span class="badge badge-warning">Pending</span>`;
        const itemCount = (t.items ?? []).length;
        const rowId = `row-${i}`;
        const row = `
          <tr class="anim-fade">
            <td><span class="bill-id">${t.billId ?? t.id.slice(0,10)}</span></td>
            <td>
              <div style="font-size:0.875rem;font-weight:600;">${fmtDate(t.timestamp)}</div>
              <div style="font-size:0.75rem;color:var(--text-tertiary);">${fmtTime(t.timestamp)}</div>
            </td>
            <td style="font-size:0.875rem;">${itemCount} item${itemCount!==1?'s':''}</td>
            <td>
              <div style="display:flex;align-items:center;gap:5px;">
                <span class="material-symbols-outlined" style="font-size:0.9rem;color:${methodColor[t.paymentMethod]??'var(--text-tertiary)'};">
                  ${methodIcon[t.paymentMethod]??'payments'}
                </span>
                <span style="font-size:0.82rem;text-transform:uppercase;font-weight:600;">${t.paymentMethod??'—'}</span>
              </div>
            </td>
            <td>${statusBadge}</td>
            <td class="text-right mono" style="font-weight:700;">${fmtINR(t.total)}</td>
            <td class="text-right">
              <button class="icon-btn" onclick="toggleExpand('${rowId}')" title="View items">
                <span class="material-symbols-outlined" id="expand-icon-${rowId}">expand_more</span>
              </button>
            </td>
          </tr>
          <tr class="expand-row" id="${rowId}">
            <td class="expand-cell" colspan="7">
              <div class="expand-inner">
                <div class="expand-items-header">
                  <span>Item</span><span>Qty</span><span>Unit Price</span><span>Total</span>
                </div>
                ${(t.items??[]).map(item=>`
                  <div class="expand-item-row">
                    <span>${item.name}</span>
                    <span class="mono">${item.qty}</span>
                    <span class="mono">${fmtINR(item.price)}</span>
                    <span class="mono">${fmtINR(item.lineTotal)}</span>
                  </div>`).join("")}
                <div style="display:flex;justify-content:flex-end;gap:24px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-subtle);font-size:0.82rem;">
                  <span>Subtotal: <strong class="mono">${fmtINR(t.subtotal)}</strong></span>
                  <span>GST: <strong class="mono">${fmtINR(t.tax)}</strong></span>
                  <span style="font-size:0.9rem;">Total: <strong class="mono" style="color:var(--primary);">${fmtINR(t.total)}</strong></span>
                </div>
              </div>
            </td>
          </tr>`;
        return [row];
      }).join("");
    }

    window.toggleExpand = function(id) {
      const row  = document.getElementById(id);
      const icon = document.getElementById("expand-icon-" + id);
      if (!row) return;
      row.classList.toggle("open");
      icon.textContent = row.classList.contains("open") ? "expand_less" : "expand_more";
    };

    function renderPaginator() {
      const total  = filtered.length;
      const pages  = Math.ceil(total / PAGE_SIZE);
      const start  = page * PAGE_SIZE + 1;
      const end    = Math.min((page + 1) * PAGE_SIZE, total);

      document.getElementById("pageInfo").textContent =
        total === 0 ? "No entries" : `Showing ${start}–${end} of ${total} entries`;

      const controls = document.getElementById("pageControls");
      const makePage = (i) => `<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i+1}</button>`;

      let html = `<button class="page-btn" onclick="goPage(${page-1})" ${page===0?'disabled':''}>
        <span class="material-symbols-outlined">chevron_left</span></button>`;

      if (pages <= 7) {
        for (let i=0;i<pages;i++) html += makePage(i);
      } else {
        html += makePage(0);
        if (page > 2) html += `<span class="page-btn" style="cursor:default;border:none;">…</span>`;
        for (let i=Math.max(1,page-1); i<=Math.min(pages-2,page+1); i++) html += makePage(i);
        if (page < pages-3) html += `<span class="page-btn" style="cursor:default;border:none;">…</span>`;
        html += makePage(pages-1);
      }

      html += `<button class="page-btn" onclick="goPage(${page+1})" ${page>=pages-1?'disabled':''}>
        <span class="material-symbols-outlined">chevron_right</span></button>`;

      controls.innerHTML = html;
    }

    window.goPage = function(p) {
      const pages = Math.ceil(filtered.length / PAGE_SIZE);
      if (p < 0 || p >= pages) return;
      page = p;
      renderTable();
      renderPaginator();
      document.querySelector(".table-wrap")?.scrollIntoView({ behavior:"smooth", block:"start" });
    };

    // ── Status filter pills ───────────────────────────────
    document.querySelectorAll(".filter-pill").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-pill").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        statusFilter = btn.dataset.status;
        applyFilters();
      });
    });

    // ── Date range filter ─────────────────────────────────
    window.applyDateFilter = async function() {
      const from = document.getElementById("dateFrom").value;
      const to   = document.getElementById("dateTo").value;
      if (!from || !to) return;
      try {
        const start = new Date(from); start.setHours(0,0,0,0);
        const end   = new Date(to);   end.setHours(23,59,59,999);
        if (unsub) unsub();
        document.getElementById("ledgerBody").innerHTML = `<tr><td colspan="7"><div class="skeleton" style="height:200px;border-radius:0;"></div></td></tr>`;
        const txs = await fetchTransactionsByRange(start, end);
        allTx = txs;
        applyFilters();
        renderStats();
      } catch(e) {
        showToast("Date filter failed: " + e.message, "danger");
      }
    };

    // ── CSV Export ────────────────────────────────────────
    window.exportCSV = function() {
      const headers = ["Bill ID","Date","Time","Items","Payment","Status","Subtotal","Tax","Total"];
      const rows = filtered.map(t => [
        t.billId ?? t.id,
        fmtDate(t.timestamp),
        fmtTime(t.timestamp),
        (t.items??[]).length,
        t.paymentMethod,
        t.status,
        t.subtotal, t.tax, t.total
      ]);
      const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(",")).join("\n");
      const a = document.createElement("a");
      a.href = "data:text/csv," + encodeURIComponent(csv);
      a.download = `ledger-${new Date().toISOString().split("T")[0]}.csv`;
      a.click();
      showToast("CSV exported!", "success");
    };

    window.addEventListener("beforeunload", () => unsub?.());
  </script>
</body>
</html>
