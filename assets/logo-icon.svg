  <rect width="48" height="48" rx="12" fill="#1D9E75"/>
  <!-- Arch / storefront -->
  <path d="M10 30 C10 18 38 12 24 12 C10 12 10 22 10 30" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
