<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" fill="none" role="img" aria-label="Kerala Smart POS">
  <title>Kerala Smart POS</title>
  <!-- ── Icon: storefront arch + Kathakali eye + receipt lines ── -->
  <g transform="translate(8, 8)">
    <!-- Arch / storefront -->
    <path d="M4 30 C4 14 44 6 24 6 C4 6 4 22 4 30" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M44 30 C44 14 4 6 24 6 C44 6 44 22 44 30" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <line x1="4" y1="30" x2="44" y2="30" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Kathakali eye at apex -->
    <ellipse cx="24" cy="14" rx="7" ry="4.5" stroke="#EF9F27" stroke-width="2" fill="none"/>
    <circle cx="24" cy="14" r="2" fill="#EF9F27"/>
    <!-- Receipt lines -->
    <line x1="10" y1="36" x2="38" y2="36" stroke="#0F3D2E" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="41" x2="36" y2="41" stroke="#0F3D2E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="14" y1="46" x2="34" y2="46" stroke="#0F3D2E" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- ── Wordmark ── -->
  <text x="70" y="26" font-family="Georgia, 'DM Serif Display', serif" font-size="18" font-weight="700" fill="#0F3D2E" letter-spacing="-0.3">Kerala Smart POS</text>
  <text x="70" y="42" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" fill="#1D9E75" letter-spacing="0.08em">DIGITAL KIRANA PLATFORM</text>
  <!-- Decorative Kerala stripe -->
  <rect x="70" y="47" width="24" height="2.5" rx="1.5" fill="#1D9E75"/>
  <rect x="96" y="47" width="24" height="2.5" rx="1.5" fill="#EF9F27"/>
  <rect x="122" y="47" width="24" height="2.5" rx="1.5" fill="#D85A30"/>
</svg>
