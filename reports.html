<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBill POS — Reports</title>
  <link rel="icon" href="/assets/logo/quickbill-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles/global.css">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /* ── Page layout ── */
    .rep-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .period-pills { display:flex; gap:0; background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-lg); padding:4px; }
    .period-pill { padding:6px 16px; border:none; background:transparent; font-size:var(--font-size-small); font-weight:var(--font-weight-semibold); color:var(--color-text-secondary); border-radius:var(--radius-md); cursor:pointer; transition:all var(--transition-speed); }
    .period-pill.active { background:var(--color-primary); color:white; }
    .period-pill:hover:not(.active) { color:var(--color-text-primary); }

    /* ── Summary strip ── */
    .rep-summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
    .rep-stat { background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-xl); padding:20px 24px; box-shadow:var(--shadow-card); }
    .rep-stat-ico { width:48px; height:48px; border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; margin-bottom:12px; }
    .rep-stat-ico .lucide { width:24px; height:24px; }
    .rep-stat-label { font-size:var(--font-size-small); font-weight:var(--font-weight-semibold); color:var(--color-text-secondary); margin-bottom:6px; }
    .rep-stat-value { font-family:var(--font-body); font-size:var(--font-size-h2); font-weight:var(--font-weight-bold); color:var(--color-text-primary); }

    /* ── Grid ── */
    .rep-grid { display:grid; grid-template-columns:1fr 320px; gap:20px; }
    @media(max-width:1100px) { .rep-grid { grid-template-columns:1fr; } }

    /* ── Bar chart (pure CSS) ── */
    .chart-title { font-size:var(--font-size-body); font-weight:var(--font-weight-bold); margin-bottom:16px; }
    .bar-chart { display:flex; flex-direction:column; gap:12px; }
    .bar-row { display:flex; align-items:center; gap:12px; }
    .bar-label { font-size:var(--font-size-small); color:var(--color-text-secondary); width:90px; flex-shrink:0; text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .bar-track { flex:1; height:8px; background:var(--color-border); border-radius:var(--radius-full); overflow:hidden; }
    body.dark .bar-track { background:var(--color-neutral-800); }
    .bar-fill { height:100%; border-radius:var(--radius-full); background:var(--color-primary); transition:width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .bar-val { font-size:var(--font-size-small); font-family:var(--font-mono); color:var(--color-text-secondary); min-width:60px; font-weight:var(--font-weight-semibold); }

    /* ── Payment donut ── */
    .donut-wrap { display:flex; flex-direction:column; align-items:center; gap:20px; }
    .donut-legend { width:100%; display:flex; flex-direction:column; gap:10px; }
    .donut-row { display:flex; align-items:center; gap:12px; font-size:var(--font-size-small); }
    .donut-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
    .donut-name { flex:1; color:var(--color-text-secondary); font-weight:var(--font-weight-medium); }
    .donut-pct { font-weight:var(--font-weight-bold); font-family:var(--font-mono); color:var(--color-text-primary); }

    /* ── Top products table ── */
    .top-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--color-border); }
    .top-row:last-child { border:none; }
    .top-rank { width:28px; height:28px; border-radius:50%; background:var(--color-neutral-100); display:flex; align-items:center; justify-content:center; font-size:var(--font-size-small); font-weight:var(--font-weight-bold); color:var(--color-text-tertiary); flex-shrink:0; }
    body.dark .top-rank { background:var(--color-neutral-800); }
    .top-rank.gold { background:#fef3c7; color:var(--color-warning); }
    .top-name { flex:1; font-size:var(--font-size-body); font-weight:var(--font-weight-semibold); color:var(--color-text-primary); }
    .top-qty { font-family:var(--font-mono); font-size:var(--font-size-small); color:var(--color-text-secondary); }
  </style>
</head>
<body>
  <header id="navbar"></header>
  <aside id="sidebar"></aside>

  <main class="main-content">
    <!-- Header -->
    <div class="rep-header anim-fade-up">
      <div>
        <h1 class="page-title">Reports</h1>
        <p class="page-subtitle" id="periodLabel">Loading…</p>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div class="period-pills">
          <button class="period-pill active" data-period="today">Today</button>
          <button class="period-pill" data-period="week">7 Days</button>
          <button class="period-pill" data-period="month">30 Days</button>
        </div>
        <button class="btn btn-ghost" onclick="exportReport()">
          <i data-lucide="download"></i> Export CSV
        </button>
      </div>
    </div>

    <!-- Summary cards -->
    <div class="rep-summary" id="repSummary">
      <div class="rep-stat"><div class="rep-stat-ico skeleton" style="width:38px;height:38px;"></div><div class="skeleton" style="height:24px;width:80px;margin-top:12px;"></div></div>
      <div class="rep-stat"><div class="rep-stat-ico skeleton" style="width:38px;height:38px;"></div><div class="skeleton" style="height:24px;width:80px;margin-top:12px;"></div></div>
      <div class="rep-stat"><div class="rep-stat-ico skeleton" style="width:38px;height:38px;"></div><div class="skeleton" style="height:24px;width:80px;margin-top:12px;"></div></div>
      <div class="rep-stat"><div class="rep-stat-ico skeleton" style="width:38px;height:38px;"></div><div class="skeleton" style="height:24px;width:80px;margin-top:12px;"></div></div>
    </div>

    <!-- Main grid -->
    <div class="rep-grid">

      <!-- Left: Top Products -->
      <div style="display:flex;flex-direction:column;gap:20px;">
        <div class="card anim-fade-up d2">
          <div class="chart-title">Top Selling Products</div>
          <div class="bar-chart" id="topProductsChart">
            <div class="skeleton" style="height:10px;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:10px;margin-bottom:8px;width:80%;"></div>
            <div class="skeleton" style="height:10px;margin-bottom:8px;width:60%;"></div>
          </div>
        </div>

        <div class="card anim-fade-up d3">
          <div class="chart-title">Revenue by Day</div>
          <div id="dailyChart">
            <div class="skeleton" style="height:150px;"></div>
          </div>
        </div>
      </div>

      <!-- Right: Payment mix + top list -->
      <div style="display:flex;flex-direction:column;gap:20px;">
        <div class="card anim-fade-up d2">
          <div class="chart-title">Payment Mix</div>
          <div class="donut-wrap">
            <svg id="donutSvg" width="120" height="120" viewBox="0 0 120 120"></svg>
            <div class="donut-legend" id="donutLegend"></div>
          </div>
        </div>

        <div class="card anim-fade-up d3">
          <div class="chart-title">Top Products (Qty)</div>
          <div id="topList">
            <div class="skeleton" style="height:38px;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:38px;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:38px;"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { fetchTransactionsByRange } from "./js/services/transactionService.js";
    import { waitForAuth }              from "./js/firebase.js";
    import "./js/navigation.js";

    // ── Wait for auth before Firestore access ────────────────
    try {
      const user = await waitForAuth();
      console.log("[KSP] Reports auth ready, uid:", user.uid);
    } catch { /* redirected */ }

    let currentTxs = [];
    let activePeriod = "today";

    const COLORS = {
      cash:  "#1D9E75", // Emerald
      upi:   "#5211d4", // Primary Indigo
      card:  "#EF9F27", // Amber
      other: "#Bdbdbd",
    };

    // ── Period selector ─────────────────────────────────
    document.querySelectorAll(".period-pill").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".period-pill").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activePeriod = btn.dataset.period;
        loadReport();
      });
    });

    function getDateRange(period) {
      const now   = new Date();
      const end   = new Date(now); end.setHours(23, 59, 59, 999);
      const start = new Date(now);
      if      (period === "today") { start.setHours(0, 0, 0, 0); }
      else if (period === "week")  { start.setDate(start.getDate() - 6); start.setHours(0, 0, 0, 0); }
      else if (period === "month") { start.setDate(start.getDate() - 29); start.setHours(0, 0, 0, 0); }
      return { start, end };
    }

    async function loadReport() {
      const { start, end } = getDateRange(activePeriod);
      const label = {
        today: "Today's Summary",
        week:  "Last 7 Days Summary",
        month: "Last 30 Days Summary",
      };
      document.getElementById("periodLabel").textContent = label[activePeriod] ?? "";

      try {
        currentTxs = await fetchTransactionsByRange(start, end);
        renderSummary();
        renderTopProductsChart();
        renderPaymentDonut();
        renderTopList();
        renderDailyChart(start);
      } catch(e) {
        console.error("[KSP] Reports:", e);
        showToast("Failed to load report data", "danger");
      }
    }

    function renderSummary() {
      const revenue = currentTxs.reduce((s, t) => s + (t.total ?? 0), 0);
      const count   = currentTxs.length;
      const avg     = count ? revenue / count : 0;
      const items   = currentTxs.reduce((s, t) => s + (t.items ?? []).length, 0);

      const stats = [
        { ico:"trending-up", bg:"#d1fae5", ic:"var(--color-success)", label:"REVENUE", value: fmtINRShort(revenue) },
        { ico:"receipt-text",bg:"#fef3c7",  ic:"var(--color-warning)",  label:"BILLS",   value: count },
        { ico:"bar-chart-2",   bg:"#e0e7ff",  ic:"var(--color-primary)",  label:"AVG BILL", value: fmtINRShort(avg) },
        { ico:"package", bg:"#fee2e2",   ic:"var(--color-danger)",   label:"ITEMS SOLD", value: items },
      ];
      document.getElementById("repSummary").innerHTML = stats.map(s => `
        <div class="rep-stat anim-fade-up">
          <div class="rep-stat-ico" style="background:${s.bg};">
            <i data-lucide="${s.ico}" style="color:${s.ic};"></i>
          </div>
          <div class="rep-stat-label">${s.label}</div>
          <div class="rep-stat-value amount-total ${s.label==='REVENUE'?'amount-positive':''}">${s.value}</div>
        </div>`).join("");
      if (window.lucide) window.lucide.createIcons();
    }

    function getTopProducts() {
      const map = {};
      currentTxs.forEach(t => (t.items ?? []).forEach(i => {
        map[i.name] = (map[i.name] ?? 0) + i.qty;
      }));
      return Object.entries(map).sort((a, b) => b[1] - a[1]).slice(0, 8);
    }

    function renderTopProductsChart() {
      const top = getTopProducts();
      const max = top[0]?.[1] ?? 1;
      const el  = document.getElementById("topProductsChart");
      if (!top.length) { el.innerHTML = `<div class="empty-state" style="padding:20px"><p>No sales data</p></div>`; return; }
      el.innerHTML = top.map(([name, qty]) => `
        <div class="bar-row">
          <span class="bar-label" title="${name}">${name.length > 14 ? name.slice(0, 14) + "…" : name}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(qty / max * 100).toFixed(1)}%;"></div>
          </div>
          <span class="bar-val">${qty} units</span>
        </div>`).join("");
    }

    function renderPaymentDonut() {
      const breakdown = currentTxs.reduce((acc, t) => {
        const m = t.paymentMethod ?? "other";
        acc[m] = (acc[m] ?? 0) + (t.total ?? 0);
        return acc;
      }, {});
      const total   = Object.values(breakdown).reduce((a, b) => a + b, 0);
      const entries = Object.entries(breakdown).sort((a, b) => b[1] - a[1]);

      const R = 44, CX = 60, CY = 60, CIRC = 2 * Math.PI * R;
      const svg   = document.getElementById("donutSvg");
      const legend = document.getElementById("donutLegend");
      
      const themeOutline = document.body.classList.contains("dark") ? "#262626" : "#f5f5f5";
      
      if (!total) {
        svg.innerHTML = `<circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="${themeOutline}" stroke-width="16"/>`;
        legend.innerHTML = `<p style="font-size:0.82rem;color:var(--color-text-tertiary)">No payment data</p>`;
        return;
      }
      let offset = 0;
      svg.innerHTML = entries.map(([m, v]) => {
        const pct  = v / total;
        const dash = pct * CIRC;
        const seg  = `<circle cx="${CX}" cy="${CY}" r="${R}" fill="none"
          stroke="${COLORS[m] ?? COLORS.other}" stroke-width="16"
          stroke-dasharray="${dash.toFixed(2)} ${CIRC.toFixed(2)}"
          stroke-dashoffset="${(-offset).toFixed(2)}"
          transform="rotate(-90 ${CX} ${CY})"/>`;
        offset += dash;
        return seg;
      }).join("") + `<text x="${CX}" y="${CY}" text-anchor="middle" dy=".35em"
        font-size="16" font-weight="700" fill="var(--color-text-primary)">${entries.length}</text>`;

      legend.innerHTML = entries.map(([m, v]) => `
        <div class="donut-row">
          <div class="donut-dot" style="background:${COLORS[m] ?? COLORS.other};"></div>
          <span class="donut-name">${m.toUpperCase()}</span>
          <span class="donut-pct">${((v / total) * 100).toFixed(0)}%</span>
        </div>`).join("");
    }

    function renderTopList() {
      const top = getTopProducts().slice(0, 5);
      const el  = document.getElementById("topList");
      if (!top.length) { el.innerHTML = `<div class="empty-state" style="padding:20px"><p>No data</p></div>`; return; }
      el.innerHTML = top.map(([name, qty], i) => `
        <div class="top-row">
          <div class="top-rank ${i === 0 ? 'gold' : ''}">${i + 1}</div>
          <span class="top-name">${name}</span>
          <span class="top-qty">${qty} sold</span>
        </div>`).join("");
    }

    function renderDailyChart(rangeStart) {
      // Group transactions by day
      const byDay = {};
      currentTxs.forEach(t => {
        if (!t.timestamp) return;
        const d   = t.timestamp.toDate ? t.timestamp.toDate() : new Date(t.timestamp);
        const key = d.toLocaleDateString("en-IN", { day:"numeric", month:"short" });
        byDay[key] = (byDay[key] ?? 0) + (t.total ?? 0);
      });
      const entries = Object.entries(byDay);
      const max = Math.max(...entries.map(([, v]) => v), 1);
      const el  = document.getElementById("dailyChart");
      if (!entries.length) {
        el.innerHTML = `<div class="empty-state" style="padding:20px"><p>No daily data</p></div>`;
        return;
      }
      el.innerHTML = `<div class="bar-chart">${entries.slice(-10).map(([day, rev]) => `
        <div class="bar-row">
          <span class="bar-label">${day}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(rev / max * 100).toFixed(1)}%;"></div>
          </div>
          <span class="bar-val amount" style="font-size:0.85rem">${fmtINRShort(rev)}</span>
        </div>`).join("")}</div>`;
    }

    // ── CSV export (item-level) ──────────────────────────────────
    window.exportReport = function() {
      const headers = ["Date","Bill ID","Item Name","Qty","Unit Price (₹)","Line Total (₹)","Payment Method","Status"];
      const rows = [];
      currentTxs.forEach(t => {
        const date   = fmtDate(t.timestamp);
        const time   = fmtTime(t.timestamp);
        const billId = t.billId ?? t.id;
        const method = t.paymentMethod ?? "—";
        const status = t.status ?? "—";
        const items  = t.items ?? [];
        if (items.length === 0) {
          rows.push([date + " " + time, billId, "(no item detail)", "", "", t.total ?? 0, method, status]);
        } else {
          items.forEach(item => {
            rows.push([
              date + " " + time,
              billId,
              item.name,
              item.qty,
              item.price,
              item.lineTotal ?? (item.price * item.qty).toFixed(2),
              method,
              status
            ]);
          });
        }
      });
      const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(",")).join("\n");
      const a = document.createElement("a");
      a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
      a.download = `report-items-${activePeriod}-${new Date().toISOString().split("T")[0]}.csv`;
      a.click();
      showToast(`Report exported — ${rows.length} item rows`, "success");
    };

    loadReport();
  </script>
  <script>lucide.createIcons();</script>
  <!-- jQuery & AJAX -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/js/jquery-ui.js"></script>
  <script src="/js/ajax-service.js"></script>
</body>
</html>
