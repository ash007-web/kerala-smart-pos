<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/logo/quickbill-mark.svg" type="image/svg+xml">
  <title>QuickBill POS — Dashboard</title>
  <link rel="stylesheet" href="styles/global.css">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /* ── Dashboard layout ── */
    .dash-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 28px;
    }
    .date-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: var(--radius-full);
      background: var(--color-surface); border: 1px solid var(--color-border);
      font-size: var(--font-size-small); color: var(--color-text-secondary); font-weight: var(--font-weight-medium);
    }
    .date-chip .lucide { width: 16px; height: 16px; color: var(--color-primary); }

    /* ── Stat cards ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px; margin-bottom: 28px;
    }
    
    @media (max-width: 1024px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: 1fr; }
    }
    .stat-card {
      /* Overrides global card styling for exact layout */
      padding: 20px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .stat-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .stat-card.alert-card { border-color: var(--color-warning); }
    .stat-icon {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .stat-icon .lucide { width: 18px; height: 18px; }
    .stat-label { font-size: var(--font-small); font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value {
      font-size: 26px; font-weight: 600; color: var(--color-text-primary);
      line-height: 1.1; margin-top: 4px; padding-top: 4px;
    }
    .stat-trend { font-size: var(--font-size-small); color: var(--color-text-secondary); display: flex; align-items: center; gap: 4px; }
    .stat-trend .lucide { width: 14px; height: 14px; }
    .trend-up   { color: var(--color-success); }
    .trend-down { color: var(--color-danger); }

    /* ── Body grid ── */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
    }
    @media (max-width: 1100px) { .dash-grid { grid-template-columns: 1fr; } }

    /* ── Activity feed ── */
    .activity-card { display: flex; flex-direction: column; }
    .view-all {
      font-size: var(--font-size-small); font-weight: var(--font-weight-semibold); color: var(--color-primary);
      background: none; border: none; cursor: pointer;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .activity-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--color-border);
      transition: background var(--transition-speed) var(--transition-ease);
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-ico {
      width: 36px; height: 36px; border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      background: var(--color-bg);
    }
    .activity-ico .lucide { width: 16px; height: 16px; color: var(--color-text-secondary); }
    .activity-info { flex: 1; min-width: 0; }
    .activity-title { font-size: var(--font-size-body); font-weight: var(--font-weight-semibold); }
    .activity-desc  { font-size: var(--font-size-small); color: var(--color-text-secondary); }
    .activity-right { text-align: right; flex-shrink: 0; }
    .activity-amount { font-size: var(--font-size-body); font-weight: var(--font-weight-semibold); }
    .activity-time   { font-size: var(--font-size-small); color: var(--color-text-secondary); }

    /* ── Payment mix ── */
    .mix-bar {
      height: 8px; border-radius: 4px;
      overflow: hidden; display: flex; gap: 2px; margin: 8px 0 6px;
    }
    .mix-seg { height: 100%; border-radius: 4px; transition: flex 0.5s var(--ease); }
    .mix-labels { display: flex; gap: 12px; flex-wrap: wrap; }
    .mix-dot {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.77rem; color: var(--text-secondary);
    }
    .mix-dot::before {
      content:''; width:8px; height:8px; border-radius:50%;
      background: var(--dot-color);
    }

    /* ── Quick actions ── */
    .quick-actions { display: flex; flex-direction: column; gap: 12px; }
    .qa-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px; border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      cursor: pointer; text-align: left; width: 100%;
      transition: all var(--transition-speed) var(--transition-ease);
    }
    .qa-btn.primary-qa { border-color: var(--color-primary); box-shadow: 0 4px 12px rgba(82,17,212,0.1); }
    .qa-btn.primary-qa:hover { border-color: var(--color-primary-hover); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(82,17,212,0.15); }
    .qa-btn.secondary-qa:hover { border-color: var(--color-text-secondary); background: var(--color-bg); }
    
    .qa-icon {
      width: 40px; height: 40px; border-radius: var(--radius-full);
      background: var(--color-bg);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .qa-icon .lucide { width: 20px; height: 20px; }
    
    .qa-btn.primary-qa .qa-icon { background: var(--color-lavender); color: var(--color-primary); }
    .qa-btn.secondary-qa .qa-icon { background: var(--color-neutral-100); color: var(--color-text-primary); }
    
    .qa-title { font-size: var(--font-size-body); font-weight: var(--font-weight-semibold); display: block; color: var(--color-text-primary); }
    .qa-desc  { font-size: var(--font-size-small); color: var(--color-text-secondary); }

    /* ── Low stock alerts ── */
    .alert-list { display: flex; flex-direction: column; gap: 8px; }
    .alert-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 12px; border-radius: var(--r-md);
      background: var(--red-50); border: 1px solid var(--red-200);
    }
    .alert-name { font-size: 0.85rem; font-weight: 600; color: var(--red-600); }
    .alert-qty  { font-size: 0.78rem; font-family: var(--font-mono); color: var(--red-400); font-weight: 700; }
  </style>
</head>
<body>
  <header id="navbar"></header>
  <aside id="sidebar"></aside>

  <main class="main-content">
    <!-- Header -->
    <div class="dash-header anim-fade-up">
      <div>
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle">Here's what's happening in your store today.</p>
      </div>
      <div class="date-chip">
        <i data-lucide="calendar"></i>
        <span id="dateText">—</span>
      </div>
    </div>

    <!-- Stat Cards -->
    <div class="stats-row" id="statsRow">
      <!-- skeleton -->
      <div class="stat-card anim-fade-up d1"><div class="skeleton" style="height:140px;border-radius:var(--radius-lg)"></div></div>
      <div class="stat-card anim-fade-up d2"><div class="skeleton" style="height:140px;border-radius:var(--radius-lg)"></div></div>
      <div class="stat-card anim-fade-up d3"><div class="skeleton" style="height:140px;border-radius:var(--radius-lg)"></div></div>
      <div class="stat-card anim-fade-up d4"><div class="skeleton" style="height:140px;border-radius:var(--radius-lg)"></div></div>
    </div>

    <!-- Body Grid -->
    <div class="dash-grid">

      <!-- Left column -->
      <div style="display:flex;flex-direction:column;gap:20px;">

        <!-- Recent Activity -->
        <div class="card activity-card anim-fade-up d2">
          <div class="card-header">
            <h3>Recent Activity</h3>
            <button class="view-all" onclick="location.href='ledger.html'">View All &rarr;</button>
          </div>
          <div id="activityList">
            <div class="skeleton" style="height:52px;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:52px;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:52px;"></div>
          </div>

          <!-- Payment mix -->
          <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border-subtle);">
            <div class="section-label">Today's Payment Mix</div>
            <div class="mix-bar" id="mixBar"></div>
            <div class="mix-labels" id="mixLabels"></div>
          </div>
        </div>

      </div>

      <!-- Right column -->
      <div style="display:flex;flex-direction:column;gap:16px;">

        <!-- Quick Actions -->
        <div class="card anim-fade-up d3">
          <div class="card-header"><h3>Quick Actions</h3></div>
          <div class="quick-actions">
            <button class="qa-btn primary-qa" onclick="location.href='pos.html'">
              <div class="qa-icon"><i data-lucide="plus-circle"></i></div>
              <div>
                <span class="qa-title">New Bill</span>
                <span class="qa-desc">Create invoice for customer</span>
              </div>
            </button>
            <button class="qa-btn secondary-qa" onclick="location.href='add-product.html'">
              <div class="qa-icon"><i data-lucide="package-plus"></i></div>
              <div>
                <span class="qa-title">Add Stock</span>
                <span class="qa-desc">Update inventory counts</span>
              </div>
            </button>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;">
            <button class="btn btn-ghost btn-sm" onclick="location.href='customers.html'" style="justify-content:center;">
              <i data-lucide="users"></i> Customers
            </button>
            <button class="btn btn-ghost btn-sm" onclick="location.href='reports.html'" style="justify-content:center;">
              <i data-lucide="bar-chart"></i> Reports
            </button>
          </div>
        </div>

        <!-- Low Stock Alerts -->
        <div class="card anim-fade-up d4">
          <div class="card-header">
            <h3>Low Stock Alerts</h3>
            <button class="view-all" onclick="location.href='inventory.html'">Manage &rarr;</button>
          </div>
          <div class="alert-list" id="alertList">
            <div class="skeleton" style="height:38px;margin-bottom:6px;"></div>
            <div class="skeleton" style="height:38px;"></div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script type="module">
    import { getTodaySummary, getLowStockProducts } from "./js/services/dashboardService.js";
    import { subscribeTransactions }                from "./js/services/transactionService.js";
    import { waitForAuth }                          from "./js/firebase.js";
    import "./js/navigation.js";

    // ── Wait for auth before any Firestore access ───────────────
    let currentUser;
    try {
      currentUser = await waitForAuth();
      console.log("[KSP] Dashboard auth ready, uid:", currentUser.uid);
    } catch { /* redirected to login */ }

    const dateEl = document.getElementById("dateText");
    if (dateEl) {
      dateEl.textContent = new Date().toLocaleDateString("en-IN", {
        weekday:"short", day:"numeric", month:"short", year:"numeric"
      });
    }

    // Initialize Lucide icons
    lucide.createIcons();

    if (!currentUser) { /* stop here — redirect in progress */ }
    else {

    // ── Load summary stats and alerts concurrently ──────────────────
    async function loadDashboard() {
      try {
        const [s, items] = await Promise.all([
          getTodaySummary(),
          getLowStockProducts(5)
        ]);
        console.log("[KSP] Dashboard stats loaded:", s);
        renderStats(s, items.length);
        renderPaymentMix(s.paymentBreakdown);
        renderAlerts(items);
      } catch(e) {
        console.error("[KSP] Dashboard stats error:", e);
        document.getElementById("statsRow").innerHTML = `
          <div style="grid-column:1/-1;color:var(--color-text-secondary);font-size:var(--font-body);padding:20px 0;">
            Could not load stats. Check Firestore connection.
          </div>`;
      }
    }

    function renderStats({ totalRevenue, billCount, avgBill }, lowStockCount) {
      const stats = [
        {
          icon:"indian-rupee", iconBg:"#e8f9f1", iconColor:"#16a34a",
          label:"Today's Revenue", value: fmtINRShort(totalRevenue),
          trend:`${billCount} bills generated`, trendClass:""
        },
        {
          icon:"receipt", iconBg:"#e9ddff", iconColor:"#5211d4",
          label:"Bills Issued", value: billCount,
          trend:"Today's transactions", trendClass:""
        },
        {
          icon:"trending-up", iconBg:"#f3e8ff", iconColor:"#9333ea",
          label:"Avg. Bill Value", value: fmtINRShort(avgBill),
          trend:"Per transaction today", trendClass:""
        },
      ];

      stats.push({
        icon:"alert-triangle", iconBg:"#fef3c7", iconColor:"#d97706",
        label:"Low Stock Items", value: lowStockCount,
        trend:'<a href="inventory.html" style="color:var(--color-warning);font-weight:600;">View Details &rarr;</a>',
        trendClass:"alert-card", raw:true
      });

      document.getElementById("statsRow").innerHTML = stats.map((s,i) => `
        <div class="card stat-card ${s.trendClass ?? ''} anim-fade-up d${i+1}">
          <div class="stat-card-header">
            <div class="stat-icon" style="background:${s.iconBg};color:${s.iconColor};">
              <i data-lucide="${s.icon}"></i>
            </div>
            <p class="stat-label">${s.label}</p>
          </div>
          <p class="stat-value">${s.value}</p>
          <p class="stat-trend">${s.raw ? s.trend : `<i data-lucide="clock"></i>${s.trend}`}</p>
        </div>
      `).join("");
      
      lucide.createIcons();
    }

    function renderPaymentMix(breakdown) {
      const bar    = document.getElementById("mixBar");
      const labels = document.getElementById("mixLabels");
      if (!bar) return;
      const total = Object.values(breakdown).reduce((a,b)=>a+b,0);
      if (total === 0) { bar.innerHTML = `<div class="mix-seg" style="flex:1;background:var(--color-neutral-300);"></div>`; return; }
      const colors = { cash:"#1D9E75", upi:"#5211d4", card:"#EF9F27", other:"#Bdbdbd" };
      const entries = Object.entries(breakdown).sort((a,b)=>b[1]-a[1]);
      bar.innerHTML = entries.map(([m,v])=>
        `<div class="mix-seg" style="flex:${v};background:${colors[m]??colors.other};" title="${m}: ${fmtINR(v)}"></div>`
      ).join("");
      labels.innerHTML = entries.map(([m,v])=>`
        <div class="mix-dot" style="--dot-color:${colors[m]??colors.other}">
          ${m.toUpperCase()} ${((v/total)*100).toFixed(0)}%
        </div>`).join("");
    }

    // ── Real-time activity feed ──────────────────────────────────
    subscribeTransactions((txs) => {
      const el = document.getElementById("activityList");
      if (!el) return;
      console.log("[KSP] Dashboard transactions:", txs.length);
      if (txs.length === 0) {
        el.innerHTML = `<div class="empty-state"><i data-lucide="receipt"></i><p>No transactions yet.</p></div>`;
        lucide.createIcons();
        return;
      }
      const methodIcon  = { cash:"banknote", upi:"qr-code", card:"credit-card" };
      const methodColor = { cash:"#d1fae5", upi:"#e9ddff", card:"#f3f4f6" };
      const textColor   = { cash:"#10b981", upi:"#5211d4", card:"#6b7280" };
      el.innerHTML = txs.slice(0,8).map(t => `
        <div class="activity-item anim-slide">
          <div class="activity-ico" style="background:${methodColor[t.paymentMethod]??'var(--color-neutral-100)'}">
            <i data-lucide="${methodIcon[t.paymentMethod] ?? 'receipt'}" style="color:${textColor[t.paymentMethod]??'var(--color-text-secondary)'}"></i>
          </div>
          <div class="activity-info">
            <div class="activity-title">${t.billId ?? t.id.slice(0,10).toUpperCase()}</div>
            <div class="activity-desc">${t.paymentMethod?.toUpperCase() ?? '—'} · ${relativeTime(t.timestamp)}</div>
          </div>
          <div class="activity-right">
            <div class="activity-amount">${fmtINR(t.total)}</div>
            <div class="activity-time">${fmtTime(t.timestamp)}</div>
          </div>
        </div>`).join("");
      lucide.createIcons();
    }, 20);

    // ── Low stock alerts ─────────────────────────────────────────
    function renderAlerts(items) {
      window._lowStock = items.length;
      const el = document.getElementById("alertList");
      if (!el) return;
      if (items.length === 0) {
        el.innerHTML = `<div style="color:var(--color-success);font-size:var(--font-body);display:flex;align-items:center;gap:6px;">
          <i data-lucide="check-circle" style="width:16px;height:16px;"></i> All stock levels are OK
        </div>`;
        lucide.createIcons();
        return;
      }
      el.innerHTML = items.map(p => `
        <div class="alert-row">
          <span class="alert-name">${p.name}</span>
          <span class="alert-qty">${p.stock} left</span>
        </div>`).join("");
    }

    loadDashboard();

    } // end if (currentUser)
  </script>
</body>
</html>
