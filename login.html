<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBill POS — Login</title>
  <link rel="icon" href="assets/logo/quickbill-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles/global.css">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    .login-brand {
      text-align: center; margin-bottom: 32px;
      width: 100%; max-width: 420px;
    }
    .login-brand .mark {
      width: 64px; height: 64px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      transition: transform var(--transition-speed);
      background: transparent;
    }
    .login-brand .mark img {
        width: 100%; height: 100%;
    }
    .login-brand .mark:hover { transform: scale(1.06) rotate(-3deg); }
    .login-brand h1 {
      font-size: 28px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 4px;
    }
    .login-brand p { color: #6b7280; font-size: 14px; }
    
    .login-stripe {
      height: 4px;
      background: repeating-linear-gradient(90deg,
        var(--color-primary) 0,var(--color-primary) 8px,
        var(--color-emerald) 8px,var(--color-emerald) 16px,
        var(--color-amber) 16px,var(--color-amber) 24px,
        transparent 24px,transparent 34px);
    }
    .login-body h2 { font-size: 20px; font-weight: 500; margin-bottom: 4px; color:var(--color-text-primary); }
    .login-body .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 28px; }
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block; font-size: var(--font-size-small); font-weight: var(--font-weight-semibold);
      color: var(--color-text-secondary); margin-bottom: 8px;
    }
    .login-input {
      width: 100%; height: 48px;
      padding: 0 14px 0 44px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: var(--font-size-body); color: var(--color-text-primary);
      transition: all 0.2s ease;
    }
    body.dark .login-input { background: var(--color-neutral-800); border-color: var(--color-border); }
    .login-input:focus {
      outline: none;
      border-color: #5211d4;
      box-shadow: 0 0 0 3px rgba(82, 17, 212, 0.12);
    }
    .login-input-wrap { position: relative; }
    .login-input-wrap .lucide.ico {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--color-text-tertiary); pointer-events: none; width:18px; height:18px;
    }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--color-text-tertiary);
      cursor: pointer; padding: 4px;
    }
    .pw-toggle:hover { color: var(--color-text-primary); }
    .pw-toggle .lucide { width:18px; height:18px; }
    .forgot { text-align: right; margin-top: 8px; }
    .forgot a { font-size: var(--font-size-small); font-weight: var(--font-weight-semibold); color: var(--color-primary); }
    
    .login-btn {
      width: 100%; height: 48px; margin-top: 12px;
      background: #5211d4; color: white;
      border: none; border-radius: 8px;
      font-size: var(--font-size-body); font-weight: var(--font-weight-semibold);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .login-btn:hover { background: #3f0ec0; transform: translateY(-1px); }
    .login-btn:active { transform: scale(0.98); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow:none; }
    .login-btn .lucide { width:18px; height:18px; }
    
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0; color: var(--color-text-tertiary); font-size: var(--font-size-small);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--color-border);
    }
    
    .google-btn {
      width: 100%; height: 48px;
      background: white; color: var(--color-text-primary);
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: var(--font-size-body); font-weight: var(--font-weight-medium);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .google-btn:hover { background: #fafafa; }
    .google-btn svg { width: 18px; height: 18px; }
    
    .login-footer {
      padding: 16px 32px 24px;
      text-align: center;
      border-top: 1px solid var(--color-border);
      font-size: var(--font-size-small); color: var(--color-text-secondary);
    }
    .demo-hint {
      background: var(--color-lavender);
      border: 1px solid rgba(82, 17, 212, 0.1);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: var(--font-size-small); color: var(--color-primary);
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 12px;
    }
    .demo-hint .lucide { width: 20px; height: 20px; flex-shrink: 0; }
    .error-msg {
      background: #fee2e2; border: 1px solid #fca5a5;
      border-radius: var(--radius); padding: 12px 16px;
      font-size: var(--font-size-small); color: var(--color-danger);
      margin-bottom: 16px; display: none;
      align-items: center; gap: 8px;
    }
    .error-msg.show { display: flex; }
    .error-msg .lucide { width: 18px; height: 18px; }
  </style>
</head>
<body class="login-page">

  <div class="auth-layout">
    <div class="login-brand">
      <div class="mark">
        <img src="assets/logo/quickbill-mark.svg" alt="QuickBill Logo Mark">
      </div>
      <h1>QuickBill POS</h1>
      <p>Modern Dashboard & Checkout</p>
    </div>

    <div class="login-card">
      <div class="login-stripe"></div>
      <div class="login-body">
        <h2>Welcome back</h2>
        <p class="subtitle">Login to your store dashboard.</p>

        <div class="demo-hint">
          <i data-lucide="lightbulb"></i>
          <span>Demo: use any email + password (min 6 chars) to create an account on first login.</span>
        </div>

        <div class="error-msg" id="errorMsg">
          <i data-lucide="alert-circle"></i>
          <span id="errorText">Invalid credentials.</span>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="login-input-wrap">
            <i data-lucide="at-sign" class="ico"></i>
            <input type="email" id="emailInput" class="login-input"
              placeholder="you@example.com" autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="login-input-wrap">
            <i data-lucide="lock" class="ico"></i>
            <input type="password" id="passwordInput" class="login-input"
              placeholder="Enter your password" autocomplete="current-password">
            <button class="pw-toggle" onclick="togglePw()" type="button">
              <i data-lucide="eye-off" id="pwIcon"></i>
            </button>
          </div>
          <div class="forgot"><a href="#">Forgot password?</a></div>
        </div>

        <button class="login-btn" id="loginBtn" onclick="handleLogin()">
          <i data-lucide="log-in"></i>
          Login to Store
        </button>

        <div class="divider">or continue with</div>

        <button class="google-btn" onclick="handleGoogle()">
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
      </div>

      <div class="login-footer">
        © 2026 QuickBill POS &nbsp;·&nbsp; Seamless Retailing
      </div>
    </div>
  </div>

  <script type="module">
    import { loginWithEmail, loginWithGoogle, registerWithEmail, onAuthChange } from "./js/services/authService.js";
    import { provisionShop } from "./js/services/shopService.js";

    // Redirect if already logged in
    onAuthChange((user) => {
      if (user) window.location.href = "index.html";
    });

    async function afterLogin(user) {
      // Provision the shop immediately — don't wait for navigation.js
      try { await provisionShop(user); } catch(e) { console.warn("[KSP] Provision:", e); }
      window.location.href = "index.html";
    }

    window.handleLogin = async function() {
      const email    = document.getElementById("emailInput").value.trim();
      const password = document.getElementById("passwordInput").value;
      const btn      = document.getElementById("loginBtn");

      hideError();
      if (!email || !password) return showError("Please enter email and password.");

      btn.disabled = true;
      btn.innerHTML = `<i data-lucide="loader-2" style="animation:spin 0.8s linear infinite" class="lucide"></i> Logging in…`;
      if (window.lucide) window.lucide.createIcons();

      try {
        const cred = await loginWithEmail(email, password);
        await afterLogin(cred.user);
      } catch (err) {
        if (err.code === "auth/user-not-found" || err.code === "auth/invalid-credential") {
          // Auto-register for demo
          try {
            const cred = await registerWithEmail(email, password);
            await afterLogin(cred.user);
          } catch (regErr) {
            showError(friendlyError(regErr.code));
            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="log-in" class="lucide"></i> Login to Store`;
            if (window.lucide) window.lucide.createIcons();
          }
        } else {
          showError(friendlyError(err.code));
          btn.disabled = false;
          btn.innerHTML = `<i data-lucide="log-in" class="lucide"></i> Login to Store`;
          if (window.lucide) window.lucide.createIcons();
        }
      }
    };

    window.handleGoogle = async function() {
      hideError();
      try {
        const cred = await loginWithGoogle();
        await afterLogin(cred.user);
      } catch (err) {
        showError(friendlyError(err.code));
      }
    };

    // Enter key submits
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleLogin();
    });

    function showError(msg) {
      document.getElementById("errorText").textContent = msg;
      document.getElementById("errorMsg").classList.add("show");
    }
    function hideError() {
      document.getElementById("errorMsg").classList.remove("show");
    }
    function friendlyError(code) {
      const map = {
        "auth/wrong-password":       "Incorrect password.",
        "auth/invalid-email":        "Invalid email address.",
        "auth/too-many-requests":    "Too many attempts. Please try later.",
        "auth/network-request-failed":"Network error. Check your connection.",
        "auth/popup-closed-by-user": "Google sign-in was cancelled.",
      };
      return map[code] ?? "Login failed. Please try again.";
    }
  </script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script>
    lucide.createIcons();
    window.togglePw = function() {
        const passwordInput = document.getElementById("passwordInput");
        const pwIcon = document.getElementById("pwIcon");
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            pwIcon.setAttribute("data-lucide", "eye");
        } else {
            passwordInput.type = "password";
            pwIcon.setAttribute("data-lucide", "eye-off");
        }
        lucide.createIcons();
    }
  </script>
</body>
</html>
