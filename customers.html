<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">\n  <title>Kerala Smart POS — Customers</title>
  <link rel="stylesheet" href="styles/global.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    .cust-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .cust-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:16px; }
    .cust-card {
      background:var(--bg-surface); border:1px solid var(--border-subtle);
      border-radius:var(--r-xl); padding:20px;
      transition:all var(--t-fast) var(--ease);
      box-shadow:var(--shadow-sm);
    }
    .cust-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-md); border-color:var(--border-default); }
    .cust-top { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
    .avatar {
      width:48px; height:48px; border-radius:50%; flex-shrink:0;
      background:linear-gradient(135deg, var(--primary), var(--gold-100));
      display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; font-weight:700; color:var(--gold-900);
      font-family:var(--font-display);
    }
    .cust-name { font-size:1rem; font-weight:700; }
    .cust-meta { font-size:0.78rem; color:var(--text-secondary); }
    .cust-details { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
    .cust-detail { display:flex; align-items:center; gap:6px; font-size:0.82rem; color:var(--text-secondary); }
    .cust-detail .material-symbols-outlined { font-size:0.9rem; color:var(--primary); }
    .cust-actions { display:flex; gap:8px; padding-top:12px; border-top:1px solid var(--border-subtle); }
    .cust-actions button { flex:1; }
    .cust-stat { font-family:var(--font-mono); font-size:0.78rem; }

    /* Modal */
    .modal-overlay { position:fixed;inset:0;background:var(--bg-overlay);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity var(--t-med) var(--ease); }
    .modal-overlay.show { opacity:1; pointer-events:all; }
    .modal-box { background:var(--bg-surface);border-radius:var(--r-2xl);width:420px;max-width:90vw;box-shadow:var(--shadow-lg);transform:scale(0.9) translateY(16px);transition:transform var(--t-med) var(--ease-spring);overflow:hidden; }
    .modal-overlay.show .modal-box { transform:scale(1) translateY(0); }
    .modal-header { display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--border-subtle); }
    .modal-header h3 { font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px; }
    .modal-header h3 .material-symbols-outlined { color:var(--primary); }
    .modal-body { padding:20px 24px;display:flex;flex-direction:column;gap:14px; }
    .form-group label { display:block;font-size:0.78rem;font-weight:700;color:var(--text-secondary);margin-bottom:6px;letter-spacing:0.04em; }
    .modal-footer { padding:12px 24px 20px;display:flex;gap:10px;justify-content:flex-end; }
  </style>
</head>
<body>
  <header id="navbar"></header>
  <aside id="sidebar"></aside>
  <main class="main-content">
    <div class="cust-header anim-fade-up">
      <div>
        <h1 class="page-title">Customers</h1>
        <p class="page-subtitle" id="custCount">Loading…</p>
      </div>
      <div class="flex gap-3 items-center">
        <div class="input-wrap" style="width:220px;">
          <span class="material-symbols-outlined">search</span>
          <input type="text" class="input" id="custSearch" placeholder="Search by name or phone…">
        </div>
        <button class="btn btn-primary" onclick="openAddModal()">
          <span class="material-symbols-outlined">person_add</span> Add Customer
        </button>
      </div>
    </div>
    <div class="cust-grid" id="custGrid">
      <!-- 6 skeleton cards shown while customers load from Firestore -->
      <div class="cust-card"><div class="skeleton" style="height:140px;border-radius:var(--r-lg);"></div></div>
      <div class="cust-card"><div class="skeleton" style="height:140px;border-radius:var(--r-lg);"></div></div>
      <div class="cust-card"><div class="skeleton" style="height:140px;border-radius:var(--r-lg);"></div></div>
      <div class="cust-card"><div class="skeleton" style="height:140px;border-radius:var(--r-lg);"></div></div>
      <div class="cust-card"><div class="skeleton" style="height:140px;border-radius:var(--r-lg);"></div></div>
      <div class="cust-card"><div class="skeleton" style="height:140px;border-radius:var(--r-lg);"></div></div>
    </div>

  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="custModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3><span class="material-symbols-outlined">person</span><span id="modalTitle">Add Customer</span></h3>
        <button class="icon-btn" onclick="closeModal()"><span class="material-symbols-outlined">close</span></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="form-group"><label>Full Name</label><input type="text" class="input" id="fName" placeholder="Customer name" autofocus></div>
        <div class="form-group"><label>Phone Number</label><input type="tel" class="input" id="fPhone" placeholder="10-digit mobile number"></div>
        <div class="form-group"><label>Email (optional)</label><input type="email" class="input" id="fEmail" placeholder="email@example.com"></div>
        <div class="form-group"><label>Address (optional)</label><input type="text" class="input" id="fAddress" placeholder="Area, City"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveCustomer()">
          <span class="material-symbols-outlined">save</span> Save Customer
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { subscribeCustomers, addCustomer, updateCustomer, deleteCustomer } from "./js/services/customerService.js";
    import "./js/navigation.js";

    let allCustomers = [];
    let unsub = null;

    unsub = subscribeCustomers((customers) => {
      allCustomers = customers;
      renderCustomers(customers);
    });

    function renderCustomers(list) {
      const grid = document.getElementById("custGrid");
      document.getElementById("custCount").textContent = `${list.length} customer${list.length!==1?'s':''}`;
      if (list.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="material-symbols-outlined">group</span><p>No customers yet</p></div>`;
        return;
      }
      grid.innerHTML = list.map(c => `
        <div class="cust-card anim-fade-up">
          <div class="cust-top">
            <div class="avatar">${c.name.charAt(0).toUpperCase()}</div>
            <div>
              <div class="cust-name">${c.name}</div>
              <div class="cust-meta">${c.billCount ?? 0} bills · ${fmtINRShort(c.totalSpent ?? 0)} spent</div>
            </div>
          </div>
          <div class="cust-details">
            <div class="cust-detail"><span class="material-symbols-outlined">phone</span>${c.phone}</div>
            ${c.email ? `<div class="cust-detail"><span class="material-symbols-outlined">alternate_email</span>${c.email}</div>` : ""}
            ${c.address ? `<div class="cust-detail"><span class="material-symbols-outlined">location_on</span>${c.address}</div>` : ""}
          </div>
          <div class="cust-actions">
            <button class="btn btn-ghost btn-sm" onclick="openEditModal('${c.id}')">
              <span class="material-symbols-outlined">edit</span> Edit
            </button>
            <button class="btn btn-danger btn-sm" onclick="handleDelete('${c.id}','${c.name.replace(/'/g,"\\'")}')">
              <span class="material-symbols-outlined">delete</span>
            </button>
          </div>
        </div>`).join("");
    }

    document.getElementById("custSearch").addEventListener("input", e => {
      const q = e.target.value.trim().toLowerCase();
      renderCustomers(q ? allCustomers.filter(c =>
        c.name.toLowerCase().includes(q) || c.phone.includes(q) || (c.email||"").toLowerCase().includes(q)
      ) : allCustomers);
    });

    window.openAddModal = function() {
      document.getElementById("modalTitle").textContent = "Add Customer";
      document.getElementById("editId").value = "";
      ["fName","fPhone","fEmail","fAddress"].forEach(id => document.getElementById(id).value = "");
      document.getElementById("custModal").classList.add("show");
    };

    window.openEditModal = function(id) {
      const c = allCustomers.find(c => c.id === id); if (!c) return;
      document.getElementById("modalTitle").textContent = "Edit Customer";
      document.getElementById("editId").value   = id;
      document.getElementById("fName").value    = c.name;
      document.getElementById("fPhone").value   = c.phone;
      document.getElementById("fEmail").value   = c.email ?? "";
      document.getElementById("fAddress").value = c.address ?? "";
      document.getElementById("custModal").classList.add("show");
    };

    window.closeModal = function() { document.getElementById("custModal").classList.remove("show"); };

    window.saveCustomer = async function() {
      const id    = document.getElementById("editId").value;
      const name  = document.getElementById("fName").value.trim();
      const phone = document.getElementById("fPhone").value.trim();
      if (!name || !phone) { showToast("Name and phone are required", "warning"); return; }
      const btn = document.getElementById("saveBtn");
      btn.disabled = true;
      try {
        if (id) { await updateCustomer(id, { name, phone, email:document.getElementById("fEmail").value, address:document.getElementById("fAddress").value }); showToast(`${name} updated`, "success"); }
        else    { await addCustomer({ name, phone, email:document.getElementById("fEmail").value, address:document.getElementById("fAddress").value }); showToast(`${name} added`, "success"); }
        closeModal();
      } catch(e) { showToast("Save failed: " + e.message, "danger"); }
      finally { btn.disabled = false; }
    };

    window.handleDelete = async function(id, name) {
      if (!confirm(`Delete "${name}"?`)) return;
      try { await deleteCustomer(id); showToast(`${name} removed`, "info"); }
      catch(e) { showToast("Delete failed", "danger"); }
    };

    document.getElementById("custModal").addEventListener("click", e => { if(e.target===e.currentTarget) closeModal(); });
    window.addEventListener("beforeunload", () => unsub?.());
  </script>
</body>
</html>
