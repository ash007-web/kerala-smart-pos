<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBill POS — Customers</title>
  <link rel="icon" href="/assets/logo/quickbill-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles/global.css">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    .cust-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .cust-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:16px; }
    .cust-card {
      background:var(--color-surface); border:1px solid var(--color-border);
      border-radius:var(--radius-xl); padding:20px;
      transition:all var(--transition-speed);
      box-shadow:var(--shadow-card);
    }
    .cust-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-elevated); border-color:var(--color-border-hover); }
    .cust-top { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
    .avatar {
      width:48px; height:48px; border-radius:var(--radius-full); flex-shrink:0;
      background:linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
      display:flex; align-items:center; justify-content:center;
      font-size:var(--font-size-h3); font-weight:var(--font-weight-bold); color:white;
      font-family:var(--font-heading);
    }
    .cust-name { font-size:var(--font-size-body); font-weight:var(--font-weight-bold); color:var(--color-text-primary); }
    .cust-meta { font-size:var(--font-size-small); color:var(--color-text-secondary); }
    .cust-details { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
    .cust-detail { display:flex; align-items:center; gap:8px; font-size:var(--font-size-small); color:var(--color-text-secondary); }
    .cust-detail .lucide { width:14px; height:14px; color:var(--color-primary); }
    .cust-actions { display:flex; gap:8px; padding-top:16px; border-top:1px solid var(--color-border); }
    .cust-actions button { flex:1; }
    .cust-stat { font-family:var(--font-mono); font-size:var(--font-size-small); }

    /* Modal */
    .modal-overlay { position:fixed;inset:0;background:var(--color-neutral-900);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity var(--transition-speed); }
    .modal-overlay.show { opacity:1; pointer-events:all; }
    .modal-box { background:var(--color-surface);border-radius:var(--radius-2xl);width:420px;max-width:90vw;box-shadow:var(--shadow-elevated);transform:scale(0.95) translateY(10px);transition:transform var(--transition-speed) cubic-bezier(0.34, 1.56, 0.64, 1);overflow:hidden; }
    .modal-overlay.show .modal-box { transform:scale(1) translateY(0); }
    .modal-header { display:flex;align-items:center;justify-content:space-between;padding:24px 24px 16px;border-bottom:1px solid var(--color-border); }
    .modal-header h3 { font-size:var(--font-size-body);font-weight:var(--font-weight-bold);display:flex;align-items:center;gap:10px; color:var(--color-text-primary); }
    .modal-header h3 .lucide { color:var(--color-primary); width:20px; height:20px; }
    .modal-body { padding:24px;display:flex;flex-direction:column;gap:16px; }
    .form-group label { display:block;font-size:var(--font-size-small);font-weight:var(--font-weight-semibold);color:var(--color-text-secondary);margin-bottom:8px; }
    .modal-footer { padding:16px 24px 24px;display:flex;gap:12px;justify-content:flex-end; }

    /* Responsive Adjustments */
    @media (max-width: 640px) {
      .cust-header { flex-direction: column; align-items: stretch; gap: 16px; }
      .cust-header > .flex { width: 100%; flex-direction: column; align-items: stretch; }
      .cust-header .input-wrap { width: 100% !important; }
      .cust-header .btn { width: 100%; justify-content: center; }
    }
    @media (max-width: 380px) {
      .cust-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header id="navbar"></header>
  <aside id="sidebar"></aside>
  <main class="main-content">
    <div class="cust-header anim-fade-up">
      <div>
        <h1 class="page-title">Customers</h1>
        <p class="page-subtitle" id="custCount">Loading…</p>
      </div>
      <div class="flex gap-3 items-center">
        <div class="input-wrap" style="width:220px; position:relative;">
          <i data-lucide="search" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--color-text-tertiary);"></i>
          <input type="text" class="input" id="custSearch" placeholder="Search by name or phone…" style="padding-left:36px;">
        </div>
        <button class="btn btn-primary" onclick="openAddModal()">
          <i data-lucide="user-plus"></i> Add Customer
        </button>
      </div>
    </div>
    <div class="cust-grid" id="custGrid">
      <!-- 6 skeleton cards shown while customers load from Firestore -->
      <div class="cust-card"><div class="skeleton" style="height:140px;border-radius:var(--radius-lg);"></div></div>
      <div class="cust-card"><div class="skeleton" style="height:140px;border-radius:var(--radius-lg);"></div></div>
      <div class="cust-card"><div class="skeleton" style="height:140px;border-radius:var(--radius-lg);"></div></div>
      <div class="cust-card"><div class="skeleton" style="height:140px;border-radius:var(--radius-lg);"></div></div>
      <div class="cust-card"><div class="skeleton" style="height:140px;border-radius:var(--radius-lg);"></div></div>
      <div class="cust-card"><div class="skeleton" style="height:140px;border-radius:var(--radius-lg);"></div></div>
    </div>

  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="custModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3><i data-lucide="user"></i><span id="modalTitle">Add Customer</span></h3>
        <button class="icon-btn" onclick="closeModal()"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="form-group"><label>Full Name</label><input type="text" class="input" id="fName" placeholder="Customer name" autofocus></div>
        <div class="form-group"><label>Phone Number</label><input type="tel" class="input" id="fPhone" placeholder="10-digit mobile number"></div>
        <div class="form-group"><label>Email (optional)</label><input type="email" class="input" id="fEmail" placeholder="email@example.com"></div>
        <div class="form-group"><label>Address (optional)</label><input type="text" class="input" id="fAddress" placeholder="Area, City"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveCustomer()">
          <i data-lucide="save"></i> Save Customer
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { subscribeCustomers, addCustomer, updateCustomer, deleteCustomer } from "./js/services/customerService.js";
    import "./js/navigation.js";

    let allCustomers = [];
    let unsub = null;

    unsub = subscribeCustomers((customers) => {
      allCustomers = customers;
      renderCustomers(customers);
    });

    function renderCustomers(list) {
      const grid = document.getElementById("custGrid");
      document.getElementById("custCount").textContent = `${list.length} customer${list.length!==1?'s':''}`;
      if (list.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i data-lucide="users" style="width:48px;height:48px;opacity:0.3"></i><p>No customers yet</p></div>`;
        if (window.lucide) window.lucide.createIcons();
        return;
      }
      grid.innerHTML = list.map(c => `
        <div class="cust-card anim-fade-up">
          <div class="cust-top">
            <div class="avatar">${c.name.charAt(0).toUpperCase()}</div>
            <div>
              <div class="cust-name">${c.name}</div>
              <div class="cust-meta">${c.billCount ?? 0} bills · ${fmtINRShort(c.totalSpent ?? 0)} spent</div>
            </div>
          </div>
          <div class="cust-details">
            <div class="cust-detail"><i data-lucide="phone"></i>${c.phone}</div>
            ${c.email ? `<div class="cust-detail"><i data-lucide="at-sign"></i>${c.email}</div>` : ""}
            ${c.address ? `<div class="cust-detail"><i data-lucide="map-pin"></i>${c.address}</div>` : ""}
          </div>
          <div class="cust-actions">
            <button class="btn btn-ghost btn-sm" onclick="openEditModal('${c.id}')">
              <i data-lucide="edit-2"></i> Edit
            </button>
            <button class="btn btn-danger btn-sm" style="flex: 0; padding: 0 12px; background: #fee2e2; border-color: #fee2e2; color: var(--color-danger);" onclick="handleDelete('${c.id}','${c.name.replace(/'/g,"\\'")}')">
              <i data-lucide="trash-2"></i>
            </button>
          </div>
        </div>`).join("");
      if (window.lucide) window.lucide.createIcons();
    }

    document.getElementById("custSearch").addEventListener("input", e => {
      const q = e.target.value.trim().toLowerCase();
      renderCustomers(q ? allCustomers.filter(c =>
        c.name.toLowerCase().includes(q) || c.phone.includes(q) || (c.email||"").toLowerCase().includes(q)
      ) : allCustomers);
    });

    window.openAddModal = function() {
      document.getElementById("modalTitle").textContent = "Add Customer";
      document.getElementById("editId").value = "";
      ["fName","fPhone","fEmail","fAddress"].forEach(id => document.getElementById(id).value = "");
      document.getElementById("custModal").classList.add("show");
    };

    window.openEditModal = function(id) {
      const c = allCustomers.find(c => c.id === id); if (!c) return;
      document.getElementById("modalTitle").textContent = "Edit Customer";
      document.getElementById("editId").value   = id;
      document.getElementById("fName").value    = c.name;
      document.getElementById("fPhone").value   = c.phone;
      document.getElementById("fEmail").value   = c.email ?? "";
      document.getElementById("fAddress").value = c.address ?? "";
      document.getElementById("custModal").classList.add("show");
    };

    window.closeModal = function() { document.getElementById("custModal").classList.remove("show"); };

    window.saveCustomer = async function() {
      const id    = document.getElementById("editId").value;
      const name  = document.getElementById("fName").value.trim();
      const phone = document.getElementById("fPhone").value.trim();
      if (!name || !phone) { showToast("Name and phone are required", "warning"); return; }
      const btn = document.getElementById("saveBtn");
      btn.disabled = true;
      try {
        if (id) { await updateCustomer(id, { name, phone, email:document.getElementById("fEmail").value, address:document.getElementById("fAddress").value }); showToast(`${name} updated`, "success"); }
        else    { await addCustomer({ name, phone, email:document.getElementById("fEmail").value, address:document.getElementById("fAddress").value }); showToast(`${name} added`, "success"); }
        closeModal();
      } catch(e) { showToast("Save failed: " + e.message, "danger"); }
      finally { btn.disabled = false; }
    };

    window.handleDelete = async function(id, name) {
      if (!confirm(`Delete "${name}"?`)) return;
      try { await deleteCustomer(id); showToast(`${name} removed`, "info"); }
      catch(e) { showToast("Delete failed", "danger"); }
    };

    document.getElementById("custModal").addEventListener("click", e => { if(e.target===e.currentTarget) closeModal(); });
    window.addEventListener("beforeunload", () => unsub?.());
  </script>
  <script>lucide.createIcons();</script>
  <!-- jQuery & AJAX -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/js/jquery-ui.js"></script>
  <script src="/js/ajax-service.js"></script>
</body>
</html>
