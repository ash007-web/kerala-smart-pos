<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBill POS — Inventory</title>
  <link rel="icon" href="./assets/logo/quickbill-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles/global.css">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    .inv-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .inv-controls { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }

    /* ── Category tabs ── */
    .cat-tabs { display:flex; gap:0; border-bottom:1px solid var(--color-border); margin-bottom:20px; overflow-x:auto; }
    .cat-tab {
      display:flex; align-items:center; gap:6px;
      padding:10px 16px; border:none; background:transparent;
      font-size:var(--font-size-small); font-weight:var(--font-weight-semibold); color:var(--color-text-secondary);
      border-bottom:2px solid transparent; margin-bottom:-1px;
      cursor:pointer; white-space:nowrap;
      transition:all var(--transition-speed);
    }
    .cat-tab .lucide { width: 16px; height: 16px; }
    .cat-tab:hover { color:var(--color-text-primary); }
    .cat-tab.active { color:var(--color-primary); border-bottom-color:var(--color-primary); }

    /* ── Action buttons in rows ── */
    .row-actions { display:flex; gap:4px; justify-content:flex-end; opacity:0; transition:opacity var(--transition-speed); }
    .ksp-table tbody tr:hover .row-actions { opacity:1; }
    .action-btn {
      width:32px; height:32px; border-radius:var(--radius);
      background:transparent; border:none;
      display:flex; align-items:center; justify-content:center;
      color:var(--color-text-tertiary); cursor:pointer;
      transition:all var(--transition-speed);
    }
    .action-btn:hover.stock { background:#d1fae5;  color:var(--color-success); }
    .action-btn:hover.edit  { background:#fef3c7;  color:var(--color-warning); }
    .action-btn:hover.del   { background:#fee2e2;  color:var(--color-danger); }
    .action-btn .lucide { width:16px; height:16px; }

    /* ── Edit modal ── */
    .modal-overlay {
      position:fixed; inset:0; background:var(--bg-overlay);
      backdrop-filter:blur(6px);
      display:flex; align-items:center; justify-content:center;
      z-index:500; opacity:0; pointer-events:none;
      transition:opacity var(--transition-speed);
    }
    .modal-overlay.show { opacity:1; pointer-events:all; }
    .modal-box {
      background:var(--color-surface); border-radius:var(--radius-xl);
      width:440px; max-width:90vw;
      box-shadow:var(--shadow-hover);
      transform:scale(0.9) translateY(16px);
      transition:transform var(--transition-speed);
      overflow:hidden;
    }
    .modal-overlay.show .modal-box { transform:scale(1) translateY(0); }
    .modal-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:24px 24px 16px;
      border-bottom:1px solid var(--color-border);
    }
    .modal-header h3 { font-size:var(--font-size-body); font-weight:var(--font-weight-semibold); display:flex; align-items:center; gap:8px; }
    .modal-header h3 .lucide { color:var(--color-primary); width:18px; height:18px;}
    .modal-body { padding:20px 24px; display:flex; flex-direction:column; gap:14px; }
    .form-group label { display:block; font-size:0.78rem; font-weight:700; color:var(--text-secondary); margin-bottom:6px; letter-spacing:0.04em; }
    .form-group select {
      width:100%; height:44px; padding:0 14px;
      background:var(--color-surface); border:1px solid var(--color-border);
      border-radius:var(--radius); font-size:var(--font-size-body); color:var(--color-text-primary);
    }
    .form-group select:focus { outline:none; border-color:var(--color-primary); }
    .modal-footer { padding:12px 24px 20px; display:flex; gap:10px; justify-content:flex-end; }

    /* ── Item name cell ── */
    .item-cell { display:flex; align-items:center; gap:12px; }
    .item-emoji { font-size:20px; width:32px; text-align:center; flex-shrink:0; }
    .item-info-name { font-size:var(--font-size-body); font-weight:var(--font-weight-semibold); }
    .item-info-cat  { font-size:var(--font-size-small); color:var(--color-text-tertiary); }

    /* ── Stat strip ── */
    .inv-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
    .inv-stat {
      background:var(--color-surface); border:1px solid var(--color-border);
      border-radius:var(--radius-lg); padding:20px 24px; box-shadow:var(--shadow-card);
    }
    .inv-stat-label { font-size:var(--font-size-small); font-weight:var(--font-weight-medium); color:var(--color-text-secondary); margin-bottom:8px; }
    .inv-stat-value { font-family:var(--font-body); font-size:var(--font-size-h2); font-weight:var(--font-weight-bold); color:var(--color-text-primary); }
  </style>
</head>
<body>
  <header id="navbar"></header>
  <aside id="sidebar"></aside>

  <main class="main-content">
    <div class="inv-header anim-fade-up">
      <div>
        <h1 class="page-title">Inventory</h1>
        <p class="page-subtitle">Real-time stock from Firestore</p>
      </div>
      <div class="inv-controls">
        <div class="input-wrap" style="width:280px; position:relative;">
          <i data-lucide="search" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:var(--color-text-tertiary);"></i>
          <input type="text" class="input" id="invSearch" placeholder="Search items…" style="padding-left:36px; border-radius:var(--radius-full);">
        </div>
        <button class="btn btn-primary" onclick="openAddModal()">
          <i data-lucide="plus"></i> Add Product
        </button>
      </div>
    </div>

    <!-- Stat strip -->
    <div class="inv-stats anim-fade-up d1" id="invStats">
      <div class="inv-stat"><div class="inv-stat-label">TOTAL PRODUCTS</div><div class="inv-stat-value skeleton" style="height:28px;width:60px;border-radius:6px;"></div></div>
      <div class="inv-stat"><div class="inv-stat-label">LOW STOCK</div><div class="inv-stat-value skeleton" style="height:28px;width:40px;border-radius:6px;"></div></div>
      <div class="inv-stat"><div class="inv-stat-label">OUT OF STOCK</div><div class="inv-stat-value skeleton" style="height:28px;width:40px;border-radius:6px;"></div></div>
    </div>

    <!-- Category tabs -->
    <div class="cat-tabs" id="catTabs">
      <button class="cat-tab active" data-cat="all">
        <i data-lucide="layout-grid"></i> All Items
      </button>
      <button class="cat-tab" data-cat="staples">
        <i data-lucide="wheat"></i> Staples
      </button>
      <button class="cat-tab" data-cat="dairy">
        <i data-lucide="milk"></i> Dairy
      </button>
      <button class="cat-tab" data-cat="snacks">
        <i data-lucide="cookie"></i> Snacks
      </button>
      <button class="cat-tab" data-cat="beverages">
        <i data-lucide="glass-water"></i> Beverages
      </button>
      <button class="cat-tab" data-cat="toiletries">
        <i data-lucide="sparkles"></i> Toiletries
      </button>
      <button class="cat-tab" data-cat="household">
        <i data-lucide="spray-can"></i> Household
      </button>
    </div>

    <!-- Table -->
    <div class="table-wrap anim-fade-up d2">
      <table class="ksp-table">
        <thead>
          <tr>
            <th>Item Name</th>
            <th>Price</th>
            <th>Stock Qty</th>
            <th>Status</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody id="invBody">
          <tr><td colspan="5"><div class="skeleton" style="height:48px;border-radius:0;"></div></td></tr>
          <tr><td colspan="5"><div class="skeleton" style="height:48px;border-radius:0;"></div></td></tr>
          <tr><td colspan="5"><div class="skeleton" style="height:48px;border-radius:0;"></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Add/Edit modal -->
  <div class="modal-overlay" id="productModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3><i data-lucide="package-search"></i><span id="modalTitle">Add Product</span></h3>
        <button class="icon-btn" onclick="closeModal()"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label>Item Name</label>
          <input type="text" class="input" id="fName" placeholder="e.g. Aashirvaad Atta 5kg">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" class="input" id="fPrice" placeholder="0.00" min="0" step="0.01">
          </div>
          <div class="form-group">
            <label>Stock Qty</label>
            <input type="number" class="input" id="fStock" placeholder="0" min="0">
          </div>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="fCat">
            <option value="staples">Staples</option>
            <option value="dairy">Dairy</option>
            <option value="snacks">Snacks</option>
            <option value="beverages">Beverages</option>
            <option value="toiletries">Toiletries</option>
            <option value="household">Household</option>
          </select>
        </div>
        <div class="form-group">
          <label>Barcode (optional)</label>
          <input type="text" class="input" id="fBarcode" placeholder="Scan or enter barcode">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveProduct()">
          <i data-lucide="save"></i> Save Product
        </button>
      </div>
    </div>
  </div>

  <!-- Stock Update Modal -->
  <div class="modal-overlay" id="stockModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>
          <i data-lucide="package-plus" style="color:var(--color-success)"></i>
          <span>Update Stock</span>
        </h3>
        <button class="icon-btn" onclick="closeStockModal()">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="modal-body">
        <div style="background:var(--color-neutral-100);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:4px;">
          <div style="font-size:var(--font-size-small);font-weight:var(--font-weight-medium);color:var(--color-text-secondary);margin-bottom:3px;">PRODUCT</div>
          <div style="font-weight:var(--font-weight-semibold);font-size:var(--font-size-body);" id="stkProductName">—</div>
          <div style="font-size:13px;color:var(--color-text-tertiary);margin-top:4px;">
            Current stock: <strong id="stkCurrentStock" style="color:var(--color-text-primary);">—</strong> units
          </div>
        </div>

        <div class="form-group">
          <label>Stock Change Amount <span style="color:var(--text-tertiary);font-weight:400">(use − to deduct)</span></label>
          <input type="number" class="input" id="stkDelta" placeholder="e.g. +20 or −10">
        </div>

        <!-- Quick presets -->
        <div>
          <div style="font-size:0.72rem;font-weight:700;color:var(--text-tertiary);letter-spacing:.06em;margin-bottom:6px;">QUICK PRESETS</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <button class="btn btn-ghost btn-sm" onclick="applyStockPreset(10)">+10</button>
            <button class="btn btn-ghost btn-sm" onclick="applyStockPreset(50)">+50</button>
            <button class="btn btn-ghost btn-sm" onclick="applyStockPreset(100)">+100</button>
            <button class="btn btn-ghost btn-sm" onclick="applyStockPreset(-1)" style="color:var(--red-400)">−1</button>
            <button class="btn btn-ghost btn-sm" onclick="applyStockPreset(-5)" style="color:var(--red-400)">−5</button>
          </div>
        </div>

        <div class="form-group">
          <label>Reason</label>
          <select id="stkReason" style="width:100%;height:44px;padding:0 14px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius);font-size:var(--font-size-body);color:var(--color-text-primary);">
            <option value="restock">Restock (received goods)</option>
            <option value="manual_adjustment">Manual Adjustment</option>
            <option value="correction">Correction (count error)</option>
          </select>
        </div>

        <div style="display:flex;align-items:center;gap:8px;padding:12px;background:#fef3c7;border-radius:var(--radius);font-size:13px;color:var(--color-warning);">
          <i data-lucide="info" style="width:16px; height:16px;"></i>
          Stock cannot go below zero. All changes are logged to inventory history.
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeStockModal()">Cancel</button>
        <button class="btn btn-secondary" id="saveStockBtn" onclick="saveStockUpdate()">
          <i data-lucide="save"></i> Apply Change
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/pages/inventory.js"></script>
  <script type="module" src="./js/navigation.js"></script>
  <script>lucide.createIcons();</script>
  <!-- jQuery & AJAX -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/jquery-ui.js"></script>
  <script src="js/ajax-service.js"></script>
</body>
</html>
